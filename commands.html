<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comandos — Abyssus Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.2);
            --bg-card: rgba(255, 255, 255, 0.04);
            --text-muted: #aaa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: #fff;
            min-height: 100vh;
        }

        nav {
            position: fixed; top: 0; width: 100%; backdrop-filter: blur(12px);
            background: rgba(15, 23, 42, 0.6); border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        nav h1 { font-weight: 800; color: var(--accent); font-size: 1.5rem; }
        nav .links a { color: #ccc; text-decoration: none; margin-left: 20px; transition: .3s; font-size: 0.9rem; }
        nav .links a:hover { color: #fff; }

        .header { text-align: center; padding-top: 130px; margin-bottom: 20px; }
        .header h1 { font-size: 2.5rem; font-weight: 800; }
        .header span { background: linear-gradient(90deg, #38bdf8, #6366f1); -webkit-background-clip: text; color: transparent; }
        .header p { color: var(--text-muted); margin-top: 10px; }

        .controls { max-width: 1100px; margin: 0 auto 30px; padding: 0 20px; }
        .search-box { width: 100%; max-width: 500px; margin: 0 auto 20px; }
        .search-box input {
            width: 100%; padding: 14px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            background: rgba(255,255,255,0.05); color: #fff; outline: none; transition: .3s;
        }
        .search-box input:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }

        .categories { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .category {
            padding: 8px 20px; border-radius: 20px; background: var(--bg-card);
            cursor: pointer; transition: .3s; font-size: 0.85rem; border: 1px solid transparent;
        }
        .category:hover, .category.active { background: var(--accent); color: #000; font-weight: 600; }

        .commands-grid {
            max-width: 1100px; margin: auto; display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px; padding: 20px;
        }

        .command-card {
            background: var(--bg-card); border-radius: 12px; padding: 18px;
            border: 1px solid rgba(255, 255, 255, 0.05); transition: .3s;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .command-card:hover {
            transform: translateY(-5px); border-color: var(--accent);
            box-shadow: 0 10px 20px var(--accent-glow);
        }
        .cmd-name { font-family: 'monospace'; font-weight: 600; color: var(--accent); font-size: 1.1rem; }
        .cmd-desc { font-size: 0.85rem; color: #ccc; margin: 10px 0; line-height: 1.4; }
        .cmd-tag { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        
        .copy-hint { font-size: 0.65rem; color: var(--accent); opacity: 0.6; margin-top: 5px; }

        footer { text-align: center; padding: 40px; color: #555; font-size: 0.9rem; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 50px; }
    </style>
</head>
<body>

<nav>
    <h1>Abyssus</h1>
    <div class="links">
        <a href="index.html">Inicio</a>
        <a href="#">Comandos</a>
        <a href="estado.html">Estado de Red</a>
    </div>
</nav>

<div class="header">
    <h1>📜 <span>Comandos</span></h1>
    <p>Explora la potencia de Abyssus Bot en tu servidor</p>
</div>

<div class="controls">
    <div class="search-box">
        <input type="text" id="search" placeholder="Buscar comando (ej: ban, multas, nsfw...)">
    </div>
    <div class="categories">
        <div class="category active" data-cat="all" onclick="filter('all', this)">Todos</div>
        <div class="category" data-cat="moderacion" onclick="filter('moderacion', this)">Moderación</div>
        <div class="category" data-cat="economia" onclick="filter('economia', this)">Economía</div>
        <div class="category" data-cat="utilidad" onclick="filter('utilidad', this)">Utilidad</div>
        <div class="category" data-cat="nsfw" onclick="filter('nsfw', this)">NSFW</div>
    </div>
</div>

<div class="commands-grid" id="commands-container"></div>

<footer>
    © 2026 Abyssus Bot — No afiliado con Discord
</footer>

<script>
    const comandos = [
        // --- MULTAS ---
        { n: "/multas toggle", d: "💸 Sistema de multas configurable en tiempo real", c: "moderacion" },
        { n: "/multas set", d: "Cambiar monto de multa por infracción", c: "moderacion" },
        { n: "/multas ver", d: "Ver configuración actual de multas", c: "moderacion" },
        { n: "/multas permisos", d: "Gestionar roles autorizados para multar", c: "moderacion" },
        { n: "/multas historial", d: "Ver historial de sanciones económicas", c: "moderacion" },
        { n: "/multas dm", d: "Activar/Desactivar avisos por mensaje directo", c: "moderacion" },

        // --- MODERACIÓN CORE ---
        { n: "/ban", d: "Banea a un usuario de forma permanente", c: "moderacion" },
        { n: "/kick", d: "Expulsa a un usuario del servidor", c: "moderacion" },
        { n: "/warn", d: "Advierte a un usuario por mal comportamiento", c: "moderacion" },
        { n: "/view-warnings", d: "Muestra la lista de advertencias de un usuario", c: "moderacion" },
        { n: "/clearwarning", d: "Elimina una advertencia específica por su ID", c: "moderacion" },
        { n: "/purge", d: "Borra mensajes masivamente (hasta 100)", c: "moderacion" },
        { n: "/mute", d: "Silencia a un usuario del servidor", c: "moderacion" },
        { n: "/unmute", d: "Devuelve la voz a un usuario silenciado", c: "moderacion" },
        { n: "/timemute", d: "Silencia por un tiempo definido (ej: 10m, 1h)", c: "moderacion" },

        // --- SISTEMA 911 / TICKETS ---
        { n: "/911 enviar", d: "Envía una alerta de emergencia al equipo de staff", c: "moderacion" },
        { n: "/911 estado", d: "Consulta si tu reporte ha sido atendido", c: "moderacion" },
        { n: "/911 resolver", d: "Marca una alerta como resuelta (Staff)", c: "moderacion" },
        { n: "/ticket", d: "Crea un ticket de soporte interactivo", c: "moderacion" },
        { n: "/settickets", d: "Configura el sistema de tickets en el servidor", c: "moderacion" },

        // --- LOGS & CONFIG ---
        { n: "/modlogs config", d: "Establece el canal de registros de moderación", c: "moderacion" },
        { n: "/modlogs usuario", d: "Ver historial de acciones contra un usuario", c: "moderacion" },
        { n: "/modlogs borrar", d: "Elimina todos los registros del servidor", c: "moderacion" },
        { n: "/confess set", d: "Configura el canal para confesiones anónimas", c: "moderacion" },
        { n: "/reportar", d: "Recibe denuncias directas de los usuarios", c: "moderacion" },

        // --- AUTOROLES ---
        { n: "/autoroles set", d: "📌 Establece el rol automático al entrar", c: "moderacion" },
        { n: "/autoroles view", d: "🔍 Muestra la configuración de roles actual", c: "moderacion" },
        { n: "/autoroles asignar", d: "🎯 Asigna el rol automático manualmente", c: "moderacion" },

        // --- NSFW ---
        { n: "/nsfw cambiar", d: "Activa/Desactiva el estado NSFW en el canal", c: "nsfw" },
        { n: "/nsfw listar", d: "📋 Muestra todos los canales NSFW del servidor", c: "nsfw" },
        { n: "/nsfw reset", d: "🧹 Limpia toda la configuración NSFW", c: "nsfw" },

        // --- ECONOMÍA ---
        { n: "/daily", d: "Reclama tu recompensa diaria de monedas", c: "economia" },
        { n: "/balance", d: "Consulta tu saldo en efectivo y banco", c: "economia" },

        // --- UTILIDAD ---
        { n: "/ping", d: "Verifica la latencia de Abyssus", c: "utilidad" },
        { n: "/userinfo", d: "Información detallada de un miembro", c: "utilidad" },
        { n: "/serverinfo", d: "Estadísticas generales del servidor", c: "utilidad" },
        { n: "/avatar", d: "Obtén el avatar de un usuario en HD", c: "utilidad" },
        { n: "/embedgenerador", d: "Genera mensajes personalizados con formato", c: "utilidad" },
        { n: "/lol-champion", d: "Info completa de campeones de LoL", c: "utilidad" },
        { n: "/invite", d: "Enlace para invitar al bot", c: "utilidad" }
    ];

    function render(filtro = 'all', busqueda = '') {
        const container = document.getElementById('commands-container');
        container.innerHTML = '';
        
        const filtrados = comandos.filter(cmd => {
            const matchCat = filtro === 'all' || cmd.c === filtro;
            const matchSearch = cmd.n.toLowerCase().includes(busqueda.toLowerCase()) || 
                                cmd.d.toLowerCase().includes(busqueda.toLowerCase());
            return matchCat && matchSearch;
        });

        filtrados.forEach(cmd => {
            container.innerHTML += `
                <div class="command-card" onclick="copyToClipboard('${cmd.n}')">
                    <div>
                        <div class="cmd-name">${cmd.n}</div>
                        <div class="cmd-desc">${cmd.d}</div>
                    </div>
                    <div>
                        <span class="cmd-tag">${cmd.c}</span>
                        <div class="copy-hint">Click para copiar</div>
                    </div>
                </div>
            `;
        });
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            // Opcional: Podrías añadir un toast o notificación aquí
        });
    }

    function filter(cat, el) {
        document.querySelectorAll('.category').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        render(cat, document.getElementById('search').value);
    }

    document.getElementById('search').addEventListener('input', (e) => {
        const activeEl = document.querySelector('.category.active');
        const cat = activeEl.getAttribute('data-cat');
        render(cat, e.target.value);
    });

    render();
</script>
</body>
</html>
