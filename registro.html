<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Abyssus</title>

<style>
:root{
    --bg:#07080c;
    --card:#111827;
    --card2:#0f172a;
    --border:rgba(255,255,255,.08);
    --text:#ffffff;
    --dim:#9ca3af;
    --accent:#5865F2;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:
        radial-gradient(circle at top,rgba(88,101,242,.15),transparent 50%),
        var(--bg);
    color:var(--text);
    min-height:100vh;
}

.auth-container{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.auth-box{
    width:100%;
    max-width:450px;
    background:linear-gradient(145deg,var(--card),var(--card2));
    border:1px solid var(--border);
    border-radius:25px;
    padding:35px;
}

.auth-box h1{
    text-align:center;
    margin-bottom:10px;
}

.auth-box p{
    text-align:center;
    color:var(--dim);
    margin-bottom:25px;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
}

.input-group input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#080c14;
    color:white;
    outline:none;
}

.input-group input:focus{
    border:1px solid var(--accent);
}

.auth-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:var(--accent);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.auth-btn:hover{
    opacity:.9;
}

.switch-link{
    text-align:center;
    margin-top:20px;
    color:var(--dim);
}

.switch-link a{
    color:var(--accent);
    text-decoration:none;
}

.hidden{
    display:none;
}
</style>
</head>

<body>

<div class="auth-container">

    <div class="auth-box" id="loginBox">
        <h1>👤 Iniciar Sesión</h1>
        <p>Accede al Área de Miembros de Abyssus.</p>

        <div class="input-group">
            <label>Usuario</label>
            <input id="loginUser" type="text" placeholder="Tu usuario">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input id="loginPassword" type="password" placeholder="Tu contraseña">
        </div>

        <button class="auth-btn" onclick="login()">
            Iniciar Sesión
        </button>

        <div class="switch-link">
            ¿No tienes cuenta?
            <a href="#" onclick="showRegister()">Regístrate</a>
        </div>
    </div>

    <div class="auth-box hidden" id="registerBox">
        <h1>📝 Registro</h1>
        <p>Crea una cuenta para acceder a la comunidad.</p>

        <div class="input-group">
            <label>Usuario</label>
            <input id="registerUser" type="text" placeholder="Crea un usuario">
        </div>

        <div class="input-group">
            <label>Correo</label>
            <input id="registerEmail" type="email" placeholder="correo@ejemplo.com">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input id="registerPassword" type="password" placeholder="Crea una contraseña">
        </div>

        <button class="auth-btn" onclick="register()">
            Crear Cuenta
        </button>

        <div class="switch-link">
            ¿Ya tienes cuenta?
            <a href="#" onclick="showLogin()">Inicia sesión</a>
        </div>
    </div>

</div>

<script>
function showRegister(){
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('registerBox').classList.remove('hidden');
}

function showLogin(){
    document.getElementById('registerBox').classList.add('hidden');
    document.getElementById('loginBox').classList.remove('hidden');
}

function register(){
    const user = document.getElementById('registerUser').value.trim();
    const email = document.getElementById('registerEmail').value.trim();
    const password = document.getElementById('registerPassword').value.trim();

    if(!user || !email || !password){
        alert('Completa todos los campos');
        return;
    }

    const account = {
        user: user,
        email: email,
        password: password
    };

    localStorage.setItem('abyssus_account', JSON.stringify(account));

    alert('Cuenta creada correctamente. Ahora inicia sesión.');

    document.getElementById('registerUser').value = '';
    document.getElementById('registerEmail').value = '';
    document.getElementById('registerPassword').value = '';

    showLogin();
}

function login(){
    const user = document.getElementById('loginUser').value.trim();
    const password = document.getElementById('loginPassword').value.trim();

    const account = JSON.parse(localStorage.getItem('abyssus_account'));

    if(!account){
        alert('No existe ninguna cuenta registrada');
        return;
    }

    if(account.user === user && account.password === password){
        localStorage.setItem('abyssus_logged', 'true');
        localStorage.setItem('abyssus_user', account.user);

        window.location.href = 'miembros.html';
    }else{
        alert('Usuario o contraseña incorrectos');
    }
}

window.onload = () => {
    if(localStorage.getItem('abyssus_logged') === 'true'){
        window.location.href = 'miembros.html';
    }
};
</script>

</body>
</html>
