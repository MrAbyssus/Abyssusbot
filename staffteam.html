<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssus Bot | Staff Team</title>
    <style>
        /* [Mantenemos tu CSS igual, solo asegúrate de que estas clases existan] */
        *{margin:0;padding:0;box-sizing:border-box}
        :root { --accent: #38bdf8; --border: rgba(255, 255, 255, 0.1); }
        body{ font-family:'Inter',sans-serif; background:#020617; color:#fff; padding-top:100px; display:flex; flex-direction:column; align-items:center; }
        nav { position:fixed; top:0; width:100%; background:rgba(15,23,42,0.8); backdrop-filter:blur(10px); display:flex; justify-content:space-around; align-items:center; height:70px; z-index:1000; border-bottom:1px solid var(--border); }
        .staff-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:20px; width:90%; max-width:1000px; margin-top:50px; }
        .staff-card { background:rgba(255,255,255,0.03); border:1px solid var(--border); padding:30px; border-radius:15px; text-align:center; transition: 0.3s; position:relative; }
        .avatar-container { width:120px; height:120px; margin:0 auto 20px; position:relative; }
        .staff-avatar { width:100%; height:100%; border-radius:50%; border:2px solid var(--accent); object-fit:cover; }
        .edit-badge { position:absolute; top:0; right:0; background:var(--accent); color:#000; font-size:10px; font-weight:bold; padding:5px 10px; border-radius:20px; cursor:pointer; display:none; }
        .logged-in .edit-badge { display:block; }
        .staff-access { cursor:pointer; border:1px solid var(--border); padding:5px 15px; border-radius:5px; font-size:12px; }
    </style>
</head>
<body id="app">

    <nav>
        <div style="font-weight:bold; color:var(--accent)">ABYSSUS BOT</div>
        <div class="staff-access" id="login-trigger" onclick="handleLogin()">Staff Login</div>
    </nav>

    <main class="staff-grid">
        <div class="staff-card">
            <div class="avatar-container">
                <div class="edit-badge" onclick="uploadToCloud('img-1')">SUBIR</div>
                <img id="img-1" class="staff-avatar" alt="Avatar">
            </div>
            <h3>mr.abyssus</h3>
        </div>

        <div class="staff-card">
            <div class="avatar-container">
                <div class="edit-badge" onclick="uploadToCloud('img-2')">SUBIR</div>
                <img id="img-2" class="staff-avatar" alt="Avatar">
            </div>
            <h3>Staff Colaborador</h3>
        </div>
    </main>

    <input type="file" id="file-helper" style="display:none" accept="image/*">

    <script>
        const IMGBB_API_KEY = "2f4b50d69d88e8bb8762c71e4f68783b";
        const DEFAULT_IMG_1 = "https://github.com/mr-abyssus.png";
        const DEFAULT_IMG_2 = "https://cdn.discordapp.com/embed/avatars/1.png";

        // Función para cargar imágenes (Prioridad: LocalStorage > Default)
        function loadImages() {
            const img1 = document.getElementById('img-1');
            const img2 = document.getElementById('img-2');

            img1.src = localStorage.getItem('img-1') || DEFAULT_IMG_1;
            img2.src = localStorage.getItem('img-2') || DEFAULT_IMG_2;
        }

        async function handleLogin() {
            const pass = prompt("Clave:");
            // (Tu lógica de hash aquí simplificada para el ejemplo)
            if(pass === "TU_PASS_AQUI") { // Usa tu lógica de SECRET_HASH
                document.getElementById('app').classList.add('logged-in');
                sessionStorage.setItem('isStaff', 'true');
            }
        }

        function uploadToCloud(imgId) {
            const fileInput = document.getElementById('file-helper');
            fileInput.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const imgElement = document.getElementById(imgId);
                imgElement.style.filter = "blur(4px)";

                const formData = new FormData();
                formData.append("image", file);

                try {
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                        method: "POST",
                        body: formData
                    });
                    const res = await response.json();
                    if (res.success) {
                        const url = res.data.url;
                        localStorage.setItem(imgId, url);
                        imgElement.src = url;
                        alert("¡Cambio global guardado en tu navegador!");
                    }
                } catch (err) { alert("Error al subir"); }
                finally { imgElement.style.filter = "none"; }
            };
            fileInput.click();
        }

        // Ejecutar inmediatamente al cargar el DOM
        document.addEventListener('DOMContentLoaded', () => {
            loadImages();
            if (sessionStorage.getItem('isStaff')) {
                document.getElementById('app').classList.add('logged-in');
            }
        });
    </script>
</body>
</html>
