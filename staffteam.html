<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssus Bot | Staff Team</title>
    <style>
        /* CSS Estilo Abyssus */
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Inter', sans-serif;
            background: #020617;
            color:#fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 100px;
        }
        .staff-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
        }
        .staff-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            position: relative;
        }
        .avatar-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            position: relative;
        }
        .staff-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #38bdf8;
            object-fit: cover;
            background: #111;
        }
        .edit-btn {
            position: absolute;
            top: 0; right: 0;
            background: #38bdf8;
            color: #000;
            font-size: 10px;
            font-weight: 800;
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
            display: none; /* Solo se ve al loguear */
        }
        .logged-in .edit-btn { display: block; }
        .staff-name { font-size: 1.5rem; margin-bottom: 10px; }
        .staff-role { color: #38bdf8; font-size: 0.8rem; letter-spacing: 1px; }
        .login-trigger { position: fixed; top: 20px; right: 20px; cursor: pointer; opacity: 0.3; }
    </style>
</head>
<body id="app">

    <div class="login-trigger" onclick="handleLogin()">Staff Login</div>

    <div class="staff-grid">
        <div class="staff-card">
            <div class="avatar-container">
                <div class="edit-btn" onclick="startUpload('img-1')">SUBIR</div>
                <img id="img-1" class="staff-avatar" src="https://github.com/mr-abyssus.png">
            </div>
            <h2 class="staff-name">mr.abyssus</h2>
            <p class="staff-role">CHIEF TECHNOLOGY OFFICER</p>
        </div>

        <div class="staff-card">
            <div class="avatar-container">
                <div class="edit-btn" onclick="startUpload('img-2')">SUBIR</div>
                <img id="img-2" class="staff-avatar" src="https://cdn.discordapp.com/embed/avatars/1.png">
            </div>
            <h2 class="staff-name">HIKEN D RASEC</h2>
            <p class="staff-role">KEY COLLABORATOR</p>
        </div>
    </div>

    <input type="file" id="file-selector" style="display:none" accept="image/*">

    <script>
        const IMGBB_KEY = "2f4b50d69d88e8bb8762c71e4f68783b";

        // Al cargar la página, restauramos todo
        window.onload = () => {
            if (localStorage.getItem('img-1')) document.getElementById('img-1').src = localStorage.getItem('img-1');
            if (localStorage.getItem('img-2')) document.getElementById('img-2').src = localStorage.getItem('img-2');
            if (sessionStorage.getItem('staff-auth')) document.getElementById('app').classList.add('logged-in');
        };

        function handleLogin() {
            const p = prompt("Clave:");
            // Aquí puedes poner tu hash, por ahora lo dejo simple para que no te falle
            if (p === "tu_clave_aqui") { 
                document.getElementById('app').classList.add('logged-in');
                sessionStorage.setItem('staff-auth', 'true');
            }
        }

        function startUpload(targetId) {
            const fileInput = document.getElementById('file-selector');
            
            fileInput.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const img = document.getElementById(targetId);
                img.style.opacity = "0.3";

                const formData = new FormData();
                formData.append("image", file);

                try {
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                        method: "POST",
                        body: formData
                    });
                    const data = await response.json();
                    
                    if (data.success) {
                        const finalUrl = data.data.url;
                        img.src = finalUrl;
                        localStorage.setItem(targetId, finalUrl);
                        alert("¡Imagen subida! Link: " + finalUrl);
                    } else {
                        alert("Error de ImgBB: " + data.error.message);
                    }
                } catch (err) {
                    alert("Error de conexión");
                } finally {
                    img.style.opacity = "1";
                    fileInput.value = ""; // Reset del input
                }
            };
            fileInput.click();
        }
    </script>
</body>
</html>
