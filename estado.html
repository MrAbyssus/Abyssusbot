<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssus Sentinel - Dashboard Final</title>
    <style>
        :root {
            --bg-color: #090a0b;
            --panel-bg: #111214;
            --accent: #00ffcc;
            --online: #23a55a;
            --warning: #f0b232;
            --offline: #f23f43;
            --text-gray: #949ba4;
        }

        body { 
            background: var(--bg-color); 
            color: #fff; 
            font-family: 'Inter', system-ui, sans-serif; 
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container { width: 100%; max-width: 1100px; }

        h1 { text-align: center; color: var(--accent); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; font-size: 2rem; }

        /* --- TARJETAS DE RESUMEN --- */
        .resumen-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card-resumen {
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .resumen-titulo { font-size: 0.75rem; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; }
        .resumen-valor { font-size: 1.6rem; font-weight: bold; color: var(--accent); }

        /* --- PANEL DEL GRID --- */
        .status-panel {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .legend { display: flex; gap: 15px; font-size: 0.8rem; }
        .legend-item { display: flex; align-items: center; gap: 6px; color: var(--text-gray); }
        .dot { width: 8px; height: 8px; border-radius: 50%; }

        /* --- EL GRID --- */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
            gap: 10px;
            justify-content: center;
        }

        .cluster-box {
            aspect-ratio: 1/1;
            background: #1e1f22;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.85rem;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        /* Colores de estado */
        .box-online { background: rgba(35, 165, 90, 0.1) !important; color: var(--online); border-color: var(--online); }
        .box-warning { background: rgba(240, 178, 50, 0.1) !important; color: var(--warning); border-color: var(--warning); }
        .box-offline { background: rgba(242, 63, 67, 0.1) !important; color: var(--offline); border-color: var(--offline); }

        /* --- TOOLTIP (INFO FLOTANTE) --- */
        .cluster-box .tooltip {
            visibility: hidden;
            width: 160px;
            background-color: #000;
            color: #fff;
            text-align: left;
            border-radius: 8px;
            padding: 12px;
            position: absolute;
            z-index: 100;
            bottom: 125%;
            left: 50%;
            margin-left: -80px;
            opacity: 0;
            transition: opacity 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            border: 1px solid var(--accent);
            font-size: 0.75rem;
            pointer-events: none;
        }

        .cluster-box:hover .tooltip { visibility: visible; opacity: 1; }
        .tooltip b { color: var(--accent); display: block; margin-bottom: 5px; font-size: 0.85rem; }
        .tooltip-row { display: flex; justify-content: space-between; margin-top: 4px; border-top: 1px solid #222; padding-top: 4px; }

        .cluster-box:hover { transform: scale(1.15); z-index: 99; }

    </style>
</head>
<body>

<div class="container">
    <h1>SENTINEL CORE</h1>

    <div class="resumen-container">
        <div class="card-resumen">
            <span class="resumen-titulo">Total Clusters</span>
            <span id="total-clusters" class="resumen-valor">--</span>
        </div>
        <div class="card-resumen">
            <span class="resumen-titulo">Servidores</span>
            <span id="total-servers" class="resumen-valor">--</span>
        </div>
        <div class="card-resumen">
            <span class="resumen-titulo">Usuarios Totales</span>
            <span id="total-users" class="resumen-valor">--</span>
        </div>
    </div>

    <div class="status-panel">
        <div class="panel-header">
            <span style="font-weight: bold; letter-spacing: 1px;">ESTADO DE NÚCLEOS</span>
            <div class="legend">
                <div class="legend-item"><div class="dot" style="background:var(--online)"></div> Conectado</div>
                <div class="legend-item"><div class="dot" style="background:var(--offline)"></div> Caído</div>
            </div>
        </div>

        <div id="status-grid" class="status-grid">
            </div>
    </div>
</div>

<script>
    async function refreshSentinel() {
        try {
            const res = await fetch('https://shoes-lamb-busy-anytime.trycloudflare.com/api/status');
            const data = await res.json();

            // Actualizar Resumen
            if(data.global) {
                document.getElementById('total-servers').innerText = data.global.servers.toLocaleString();
                document.getElementById('total-users').innerText = data.global.users.toLocaleString();
                document.getElementById('total-clusters').innerText = data.clusters.length;
            }

            // Actualizar Grid con Tooltips
            const grid = document.getElementById('status-grid');
            if(data.clusters) {
                grid.innerHTML = data.clusters.map(c => {
                    const isOnline = c.status.toLowerCase() === 'online';
                    const statusClass = isOnline ? 'box-online' : 'box-offline';
                    
                    return `
                        <div class="cluster-box ${statusClass}">
                            ${c.id}
                            <div class="tooltip">
                                <b>CLUSTER ${c.id}</b>
                                <div class="tooltip-row">
                                    <span>RAM:</span>
                                    <span>${c.ram} MB</span>
                                </div>
                                <div class="tooltip-row">
                                    <span>UPTIME:</span>
                                    <span>${isOnline ? c.uptime : 'OFFLINE'}</span>
                                </div>
                                <div class="tooltip-row">
                                    <span>ESTADO:</span>
                                    <span style="color:${isOnline ? 'var(--online)' : 'var(--offline)'}">${isOnline ? 'ONLINE' : 'CAÍDO'}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        } catch (e) {
            console.error("Error conectando a la API");
        }
    }

    refreshSentinel();
    setInterval(refreshSentinel, 5000);
</script>

</body>
</html>
