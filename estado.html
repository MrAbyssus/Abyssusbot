<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssus Sentinel - Panel de Control</title>
    <style>
        body { 
            background: #090a0b; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container { 
            width: 100%;
            max-width: 1100px;
        }

        h1 { 
            text-align: center;
            color: #00ffcc; 
            letter-spacing: 4px; 
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        /* --- SECCIÓN DE RESUMEN (TARJETAS GRANDES) --- */
        .resumen-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .card-resumen {
            background: #18191c;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease;
        }

        .card-resumen:hover { transform: translateY(-5px); border-color: rgba(0, 255, 204, 0.3); }

        .resumen-titulo { 
            font-size: 0.8rem; 
            color: #949ba4; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }

        .resumen-valor { 
            font-size: 1.8rem; 
            font-weight: bold; 
            color: #00ffcc; 
        }

        /* --- SECCIÓN DE CLUSTERS (GRID DE ESTADO) --- */
        .status-section {
            background: rgba(24, 25, 28, 0.5);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid #1e1f22;
        }

        .status-title {
            font-size: 1.1rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #949ba4;
        }

        .grid-clusters {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 15px;
            justify-content: center;
        }

        .mini-cluster {
            aspect-ratio: 1 / 1;
            background: #1e1f22;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        /* Colores de estado (Estilo semáforo) */
        .online { border-color: #23a55a; color: #23a55a; background: rgba(35, 165, 90, 0.05); }
        .offline { border-color: #f23f43; color: #f23f43; background: rgba(242, 63, 67, 0.05); }

        .mini-id { font-size: 1.2rem; }
        .mini-label { font-size: 0.5rem; opacity: 0.7; }

    </style>
</head>
<body>

<div class="container">
    <h1>SENTINEL CORE</h1>

    <div class="resumen-container">
        <div class="card-resumen">
            <span class="resumen-titulo">Servidores</span>
            <span id="res-servers" class="resumen-valor">--</span>
        </div>
        <div class="card-resumen">
            <span class="resumen-titulo">Usuarios</span>
            <span id="res-users" class="resumen-valor">--</span>
        </div>
        <div class="card-resumen">
            <span class="resumen-titulo">Uptime Global</span>
            <span class="resumen-valor" style="color: #23a55a;">99.9%</span>
        </div>
        <div class="card-resumen">
            <span class="resumen-titulo">Ubicación</span>
            <span class="resumen-valor" style="font-size: 1.2rem;">OVH CLOUD</span>
        </div>
    </div>

    <div class="status-section">
        <div class="status-title">
            <div style="width: 10px; height: 10px; background: #23a55a; border-radius: 50%;"></div>
            Estado de los Clusters
        </div>
        
        <div id="grid-clusters" class="grid-clusters">
            </div>
    </div>
</div>

<script>
    async function updateSentinel() {
        try {
            const res = await fetch('https://shoes-lamb-busy-anytime.trycloudflare.com/api/status');
            const data = await res.json();

            // Actualizar Resumen
            if(data.global) {
                document.getElementById('res-servers').innerText = data.global.servers.toLocaleString();
                document.getElementById('res-users').innerText = data.global.users.toLocaleString();
            }

            // Actualizar Grid
            const grid = document.getElementById('grid-clusters');
            if(data.clusters) {
                grid.innerHTML = data.clusters.map(c => {
                    const isOnline = c.status.toLowerCase() === 'online';
                    return `
                        <div class="mini-cluster ${isOnline ? 'online' : 'offline'}">
                            <span class="mini-label">CLUSTER</span>
                            <span class="mini-id">${c.id}</span>
                        </div>
                    `;
                }).join('');
            }
        } catch (e) {
            console.error("Error al conectar con la API");
        }
    }

    updateSentinel();
    setInterval(updateSentinel, 5000);
</script>

</body>
</html>
