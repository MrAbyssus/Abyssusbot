<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssus Bot | Dashboard</title>
    <style>
        :root {
            --bg: #16171d;
            --panel: #1c1d24;
            --online: #43b581;
            --warning: #faa61a;
            --offline: #f04747;
            --text-main: #dcddde;
            --text-muted: #8e9297;
            --accent: #00ffcc;
            --discord: #5865F2;
        }

        body { background-color: var(--bg); color: var(--text-main); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding-top: 90px; display: flex; justify-content: center; }

        .navbar { position: fixed; top: 0; left: 0; width: 100%; background: rgba(15, 16, 18, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #2f3136; padding: 20px 0; z-index: 1000; display: flex; justify-content: center; }
        .nav-logo { color: white; font-weight: 800; text-transform: uppercase; letter-spacing: 4px; text-decoration: none; font-size: 1.5rem; }
        .nav-logo span { color: var(--accent); }

        .container { width: 90%; max-width: 1000px; padding: 20px; display: flex; flex-direction: column; }
        .section-title { font-size: 1.1rem; font-weight: bold; margin: 30px 0 15px 0; border-bottom: 1px solid #2f3136; padding-bottom: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        
        .tech-info { background: #0c0d12; padding: 15px 20px; border-radius: 5px; display: block; max-width: fit-content; margin-top: 10px; font-family: 'Courier New', monospace; border-left: 4px solid var(--accent); }
        .tech-line { display: flex; gap: 15px; color: var(--text-main); font-weight: bold; margin-bottom: 4px; }
        .tech-label { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; width: 150px; }

        .status-ok { color: var(--online); }
        .status-ko { color: var(--offline); }
        .status-warn { color: var(--warning); }

        .watchdog-alert { color: var(--offline) !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }

        .refresh-text { font-size: 0.75rem; color: var(--text-muted); text-align: right; margin-top: 10px; }
        
        .chart-container { 
            background: var(--panel); 
            border-radius: 8px; 
            padding: 20px; 
            height: 220px; 
            position: relative; 
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .status-container { background: var(--panel); border-radius: 8px; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(38px, 1fr)); gap: 8px; }
        
        .box { aspect-ratio: 1/1; background: #2f3136; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; position: relative; cursor: pointer; transition: 0.1s; border: 1px solid transparent; }
        .box:hover { transform: scale(1.2); z-index: 10; border: 1px solid white; }
        .online { color: var(--online); border-color: var(--online); }
        .warning { color: var(--warning); border-color: var(--warning); }
        .offline { color: var(--offline); border-color: var(--offline); }

        .audit-log { background: #050505; border-radius: 6px; height: 140px; overflow-y: auto; padding: 15px; font-family: 'Courier New', monospace; font-size: 0.85rem; border: 1px solid #222; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #111; padding-bottom: 3px; }
        .log-time { color: var(--text-muted); margin-right: 10px; }
        .log-err { color: var(--offline); }
        .log-ok { color: var(--online); }

        .box .tooltip { visibility: hidden; width: 160px; background: #000; color: #fff; text-align: left; border-radius: 4px; padding: 10px; position: absolute; z-index: 100; bottom: 125%; left: 50%; margin-left: -80px; opacity: 0; transition: opacity 0.2s; font-size: 0.75rem; border: 1px solid #333; pointer-events: none; }
        .box:hover .tooltip { visibility: visible; opacity: 1; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="navbar">
    <div class="nav-content"><a href="#" class="nav-logo">ABYSSUS <span>BOT</span></a></div>
</nav>

<div class="container">
    <div class="section-title">Panel de Control</div>
    <div class="resumen-box">
        <div>Clusters: <b id="stat-clusters">--</b> | Shards: <b id="stat-shards">-- / --</b></div> 
        <div class="tech-info">
            <div class="tech-line"><span class="tech-label">ESTADO:</span> <span id="sistema-status">CONECTANDO...</span></div>
            <div class="tech-line"><span class="tech-label">RAM:</span> <span id="res-ram">-- MB</span></div>
            <div class="tech-line"><span class="tech-label">SERVIDORES:</span> <span id="res-servidores">--</span></div>
            <div class="tech-line"><span class="tech-label">TIEMPO ACTIVO:</span> <span id="res-uptime">Cargando...</span></div>
            <div class="tech-line"><span class="tech-label">PING:</span> <span id="res-ping">-- ms</span></div>
        </div>
    </div>

    <div class="section-title">Servicios & Watchdog</div>
    <div class="tech-info" style="border-left-color: var(--discord); min-width: 320px;">
        <div class="tech-line"><span class="tech-label">DISCORD:</span> <span id="discord-status">...</span></div>
        <div class="tech-line"><span class="tech-label">INCIDENTES:</span> <span id="watchdog-status" class="status-ok">0 DETECTADOS</span></div>
    </div>
    <div class="refresh-text">Refresco en: <span id="refresh-timer">3</span>s</div>

    <div class="section-title">Monitor de RAM</div>
    <div class="chart-container">
        <canvas id="ramChart"></canvas>
    </div>

    <div class="section-title">Malla de Clusters</div>
    <div class="status-container"><div id="status-grid" class="grid"></div></div>

    <div class="section-title">Malla de Shards</div>
    <div class="status-container"><div id="shards-grid" class="grid"></div></div>

    <div class="section-title">Historial (Audit Log)</div>
    <div class="audit-log" id="audit-log"></div>
</div>

<script>
let ramHistory = [];
let labelHistory = [];
let ramChart;
let timeLeft = 3;
let lastDeadCount = 0;

const logBox = document.getElementById('audit-log');
const timerText = document.getElementById('refresh-timer');
const statusText = document.getElementById('sistema-status');
const discordText = document.getElementById('discord-status');
const watchdogText = document.getElementById('watchdog-status');
const shardStatText = document.getElementById('stat-shards');

function addLog(msg, type = '') {
    const time = new Date().toLocaleTimeString();
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    let colorClass = type === 'err' ? 'log-err' : (type === 'ok' ? 'log-ok' : '');
    entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="${colorClass}">${msg}</span>`;
    logBox.prepend(entry);
}

function initChart() {
    const ctx = document.getElementById('ramChart');
    if (!ctx) return;
    ramChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labelHistory,
            datasets: [{
                label: 'RAM (MB)',
                data: ramHistory,
                borderColor: '#00ffcc',
                backgroundColor: 'rgba(0, 255, 204, 0.1)',
                fill: true,
                tension: 0.3,
                pointRadius: 0,
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            plugins: { legend: { display: false } },
            scales: {
                y: { beginAtZero: false, grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#8e9297', font: { size: 10 } } },
                x: { display: false }
            }
        }
    });
}

async function update() {
    const start = Date.now();
    try {
        fetch('https://discordstatus.com/api/v2/summary.json')
            .then(r => r.json())
            .then(d => {
                discordText.innerText = (d.status.description).toUpperCase();
                discordText.className = d.status.indicator === 'none' ? "status-ok" : "status-warn";
            }).catch(() => {});

        const res = await fetch('https://survivors-outlet-boolean-aquarium.trycloudflare.com/api/status?t=' + Date.now());
        const data = await res.json();
        
        document.getElementById('res-ping').innerText = (Date.now() - start) + " ms";
        statusText.innerText = "ONLINE";
        statusText.className = "status-ok";

        const clusters = data.clusters || [];
        const dead = clusters.filter(c => c.status?.toLowerCase() !== 'online');
        
        if (dead.length !== lastDeadCount) {
            addLog(dead.length > lastDeadCount ? `ALERTA: ${dead.length} shards caídos.` : "INFO: Shards recuperados.", dead.length > lastDeadCount ? 'err' : 'ok');
            lastDeadCount = dead.length;
        }

        watchdogText.innerText = dead.length > 0 ? `${dead.length} DETECTADOS` : "0 DETECTADOS";
        watchdogText.className = dead.length > 0 ? "watchdog-alert" : "status-ok";
        shardStatText.innerText = `${clusters.length - dead.length} / ${clusters.length}`;
        shardStatText.className = dead.length > 0 ? "watchdog-alert" : "";

        const totalRam = clusters.reduce((acc, c) => acc + (parseFloat(c.ram || 0)), 0);
        document.getElementById('res-ram').innerText = totalRam.toFixed(1) + " MB";
        document.getElementById('res-servidores').innerText = (data.global?.totalGuilds || 0).toLocaleString();
        
        // CORRECCIÓN AQUÍ: Se eliminó formatUptime para usar el valor directo de la API
        document.getElementById('res-uptime').innerText = data.global?.uptime || "Conectando...";
        
        document.getElementById('stat-clusters').innerText = clusters.length;

        const gridHTML = clusters.map(c => {
            const s = (c.status || 'offline').toLowerCase();
            const cl = s === 'online' ? 'online' : (s === 'connecting' ? 'warning' : 'offline');
            return `<div class="box ${cl}">${c.id}<div class="tooltip">ID: ${c.id}<br>Estado: ${s}<br>RAM: ${c.ram}MB</div></div>`;
        }).join('');

        document.getElementById('status-grid').innerHTML = gridHTML;
        document.getElementById('shards-grid').innerHTML = gridHTML;

        if (ramChart) {
            ramHistory.push(totalRam);
            labelHistory.push("");
            if(ramHistory.length > 40) { ramHistory.shift(); labelHistory.shift(); }
            ramChart.update();
        }
    } catch (e) {
        statusText.innerText = "OFFLINE";
        statusText.className = "status-ko";
    }
}

document.addEventListener('DOMContentLoaded', () => {
    initChart();
    addLog("Dashboard iniciado.");
    update();
    
    setInterval(() => {
        timeLeft -= 0.1;
        if (timeLeft <= 0) { timeLeft = 3; update(); }
        timerText.innerText = Math.ceil(timeLeft);
    }, 100);
});
</script>
</body>
</html>
