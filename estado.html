<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssus Sentinel - Status Grid Pro</title>
    <style>
        :root {
            --bg: #16171d;
            --panel: #1c1d24;
            --online: #43b581;
            --warning: #faa61a;
            --offline: #f04747;
            --text-main: #dcddde;
            --text-muted: #8e9297;
            --accent: #00ffcc;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding-top: 80px;
            display: flex;
            justify-content: center;
        }

        .navbar {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(15, 16, 18, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid #2f3136; padding: 15px 0; z-index: 1000;
            display: flex; justify-content: center;
        }

        .nav-content { width: 90%; max-width: 1000px; }
        .nav-logo { color: var(--accent); font-weight: bold; text-transform: uppercase; text-decoration: none; }

        .container { width: 90%; max-width: 1000px; padding: 20px; }
        .section-title { font-size: 1.5rem; font-weight: bold; margin: 30px 0 15px 0; border-bottom: 1px solid #2f3136; padding-bottom: 10px; }
        
        .tech-info { 
            background: #0c0d12; padding: 15px; border-radius: 5px; 
            margin-top: 15px; font-family: monospace; border-left: 4px solid var(--accent);
        }
        .tech-line { display: flex; gap: 15px; color: var(--accent); font-weight: bold; margin-bottom: 5px; }

        .status-container { background: var(--panel); border-radius: 8px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 8px; }
        .box {
            aspect-ratio: 1/1; background: #2f3136; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: bold; border: 1px solid transparent;
        }
        .online { color: var(--online); border-color: var(--online); }
        .offline { color: var(--offline); border-color: var(--offline); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="navbar">
    <div class="nav-content"><a href="#" class="nav-logo">ABYSSUS SENTINEL</a></div>
</nav>
      
<div class="container">
    <div class="section-title">Resumen</div>
    <div class="status-container">
        <div>Clusters: <b id="stat-clusters">--</b> | Shards Online: <b id="stat-shards">-- / --</b></div> 
        <div class="tech-info">
            <div class="tech-line">RAM TOTAL: <span id="res-ram">-- MB</span></div>
            <div class="tech-line">SERVIDORES: <span id="res-servidores">--</span></div>
            <div class="tech-line">UPTIME: <span id="res-uptime">Conectando...</span></div>
        </div>
    </div>

    <div class="section-title">Consumo de RAM</div>
    <div class="status-container">
        <div style="height: 200px;"><canvas id="ramChart"></canvas></div>
    </div>

    <div class="section-title">Clusters</div>
    <div id="status-grid" class="grid status-container"></div>

    <div class="section-title">Shards</div>
    <div id="shards-grid" class="grid status-container"></div>
</div>

<script>
    // Configuración de la Gráfica
    let ramHistory = [];
    let labelHistory = [];
    const ctx = document.getElementById('ramChart').getContext('2d');
    const ramChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labelHistory,
            datasets: [{
                label: 'RAM',
                data: ramHistory,
                borderColor: '#00ffcc',
                backgroundColor: 'rgba(0, 255, 204, 0.1)',
                fill: true,
                tension: 0.4,
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { x: { display: false }, y: { ticks: { color: '#8e9297' } } },
            plugins: { legend: { display: false } }
        }
    });

    function formatUptime(ms) {
        if (!ms || isNaN(ms)) return "Online";
        let s = Math.floor(ms / 1000), m = Math.floor(s / 60), h = Math.floor(m / 60);
        return h > 0 ? h + "h " + (m % 60) + "m" : m + "m " + (s % 60) + "s";
    }

    async function updateStatus() {
        try {
            const api = 'https://volt-nhs-entering-compiled.trycloudflare.com/status?t=' + Date.now();
            const res = await fetch(api);
            const data = await res.json();

            // Detectar la lista de clusters/shards
            const items = data.clusters || data.shards || (Array.isArray(data) ? data : []);

            if (items.length > 0) {
                const totalRam = items.reduce((acc, c) => acc + (parseInt(c.ram || c.memory || 0)), 0);
                const onlineCount = items.filter(c => c.status === 'online' || c.status === 'ready' || c.connected).length;

                // Actualizar Textos
                document.getElementById('res-ram').innerText = totalRam.toLocaleString() + " MB";
                document.getElementById('stat-clusters').innerText = items.length;
                document.getElementById('stat-shards').innerText = onlineCount + " / " + items.length;
                document.getElementById('res-servidores').innerText = (data.totalGuilds || data.guilds || (data.global ? data.global.totalGuilds : 0) || 0).toLocaleString();
                document.getElementById('res-uptime').innerText = formatUptime(data.uptime || (items[0] ? items[0].uptime : 0));

                // Actualizar Cuadrículas
                const gridHtml = items.map((c, i) => {
                    const isOnline = c.status === 'online' || c.status === 'ready' || c.connected;
                    return '<div class="box ' + (isOnline ? 'online' : 'offline') + '">' + (c.id !== undefined ? c.id : i) + '</div>';
                }).join('');

                document.getElementById('status-grid').innerHTML = gridHtml;
                document.getElementById('shards-grid').innerHTML = gridHtml;

                // Actualizar Gráfica
                ramHistory.push(totalRam);
                labelHistory.push(new Date().toLocaleTimeString());
                if(ramHistory.length > 30) { ramHistory.shift(); labelHistory.shift(); }
                ramChart.update();
            }
        } catch (e) {
            console.error("Error:", e);
            document.getElementById('res-uptime').innerText = "Error de Conexión";
        }
    }

    // Intervalo de 5 segundos
    setInterval(updateStatus, 5000);
    updateStatus();
</script>
</body>
</html>
