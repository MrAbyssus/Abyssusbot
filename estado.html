<style>
    /* ... (Mantenemos el estilo de Sentinel Core) ... */

    .cluster-card-pro {
        background: #18191c;
        border-radius: 10px;
        padding: 25px;
        position: relative;
        transition: all 0.3s ease;
        /* El borde izquierdo cambiará de color por JS */
        border-left: 6px solid #444; 
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    /* Clases de estado dinámicas */
    .status-online { border-left-color: #23a55a !important; box-shadow: 0 0 15px rgba(35, 165, 90, 0.1); }
    .status-offline { border-left-color: #f23f43 !important; box-shadow: 0 0 15px rgba(242, 63, 67, 0.1); }
    .status-warning { border-left-color: #f0b232 !important; }

    .status-tag {
        font-size: 0.7rem;
        font-weight: bold;
        padding: 3px 10px;
        border-radius: 20px;
        text-transform: uppercase;
    }

    .tag-online { background: rgba(35, 165, 90, 0.1); color: #23a55a; border: 1px solid #23a55a; }
    .tag-offline { background: rgba(242, 63, 67, 0.1); color: #f23f43; border: 1px solid #f23f43; }
</style>

<script>
    async function actualizarEstadoColor() {
        try {
            const res = await fetch('https://shoes-lamb-busy-anytime.trycloudflare.com/api/status');
            const data = await res.json();
            const contenedor = document.getElementById('lista-clusters-detallada');

            if (data.clusters) {
                contenedor.innerHTML = data.clusters.map(c => {
                    // LÓGICA DE COLOR:
                    // Si el status no es 'online', se pone rojo.
                    const isOnline = c.status.toLowerCase() === 'online';
                    const estadoClase = isOnline ? 'status-online' : 'status-offline';
                    const tagClase = isOnline ? 'tag-online' : 'tag-offline';

                    return `
                        <div class="cluster-card-pro ${estadoClase}">
                            <div class="cluster-header">
                                <span class="cluster-title">Cluster ${c.id}</span>
                                <span class="status-tag ${tagClase}">${isOnline ? 'CONECTADO' : 'CAÍDO'}</span>
                            </div>
                            
                            <div class="ram-bar-bg">
                                <div class="ram-bar-fill" style="width: ${(c.ram / 512) * 100}%; background: ${isOnline ? '#00ffcc' : '#f23f43'}"></div>
                            </div>

                            <div class="data-row">
                                <span class="data-label">Uso de Memoria</span>
                                <span class="data-value">${c.ram || 0} MB</span>
                            </div>
                            <div class="data-row">
                                <span class="data-label">Uptime</span>
                                <span class="data-value">${isOnline ? c.uptime : '---'}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        } catch (e) {
            // Si falla la conexión, podríamos poner todos en rojo aquí
            console.error("Error de conexión");
        }
    }

    setInterval(actualizarEstadoColor, 5000);
    actualizarEstadoColor();
</script>
