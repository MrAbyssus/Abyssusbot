<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssus Sentinel - Status Grid Pro</title>
    <link rel="icon" href="img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-web.png">
    <style>
        :root {
            --bg: #16171d;
            --panel: #1c1d24;
            --online: #43b581;
            --warning: #faa61a;
            --offline: #f04747;
            --text-main: #dcddde;
            --text-muted: #8e9297;
            --accent: #00ffcc;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding-top: 100px;
            display: flex;
            justify-content: center;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 16, 18, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #2f3136;
            padding: 15px 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
        }
        .nav-content { width: 90%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { color: var(--accent); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; font-size: 1.1rem; }

        /* ESTRUCTURA PRINCIPAL */
        .container { 
            width: 90%; 
            max-width: 1000px; 
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .section-title { font-size: 1.5rem; font-weight: bold; margin: 30px 0 15px 0; border-bottom: 1px solid #2f3136; padding-bottom: 10px; }
        .section-title:first-child { margin-top: 0; }
        
        .legend-list { list-style: none; padding: 0; margin-bottom: 30px; }
        .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.9rem; }
        .icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 12px; }
        .icon-online { border: 1px solid var(--online); color: var(--online); }
        .icon-warning { border: 1px solid var(--warning); color: var(--warning); }
        .icon-offline { border: 1px solid var(--offline); color: var(--offline); }

        /* CAJAS DE INFORMACIÓN */
        .resumen-box { margin-bottom: 20px; }
        .tech-info { 
            background: #0c0d12; 
            padding: 15px 20px; 
            border-radius: 5px; 
            display: block; 
            max-width: fit-content;
            margin-top: 15px; 
            font-family: 'Courier New', monospace;
            border-left: 4px solid var(--accent);
            box-shadow: inset 0 0 10px rgba(0, 255, 204, 0.05);
        }
        .tech-line { display: flex; gap: 15px; color: var(--accent); font-weight: bold; }
        .tech-label { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }

        /* GRÁFICA Y GRID */
        .status-container { 
            background: var(--panel); 
            border-radius: 8px; 
            padding: 25px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
            width: 100%;
            box-sizing: border-box;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(38px, 1fr)); gap: 8px; }
        .box {
            aspect-ratio: 1/1; background: #2f3136; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: bold; position: relative;
            cursor: pointer; transition: transform 0.1s;
        }
        .box:hover { transform: scale(1.2); z-index: 10; }
        .online { color: var(--online); border: 1px solid var(--online); }
        .warning { color: var(--warning); border: 1px solid var(--warning); }
        .offline { color: var(--offline); border: 1px solid var(--offline); }

        .box .tooltip {
            visibility: hidden; width: 160px; background: #000; color: #fff;
            text-align: left; border-radius: 4px; padding: 10px;
            position: absolute; z-index: 100; bottom: 125%; left: 50%;
            margin-left: -80px; opacity: 0; transition: opacity 0.2s;
            font-size: 0.75rem; border: 1px solid #333; pointer-events: none;
            line-height: 1.4;
        }
        .box:hover .tooltip { visibility: visible; opacity: 1; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="navbar">
    <div class="nav-content">
        <a href="index.html" class="nav-logo">
            <span style="color: var(--text-muted); font-weight: normal;">ABYSSUS</span> SENTINEL
        </a>
    </div>
</nav>
      
<div class="container">
    <div class="section-title">Colores</div>
    <ul class="legend-list">
        <li class="legend-item"><span class="icon icon-online">✔</span> Sistema operando correctamente.</li>
        <li class="legend-item"><span class="icon icon-warning">⚠</span> Latencia alta o reconectando.</li>
        <li class="legend-item"><span class="icon icon-offline">✖</span> Módulo fuera de línea.</li>
    </ul>

    <div class="section-title">Resumen</div>
    <div class="resumen-box">
        <div>Clusters activos: <b id="stat-clusters">--</b></div>
        <div>Shards Online: <b id="stat-shards">-- / --</b></div> 
        
        <div class="tech-info">
            <div class="tech-line">
                <span class="tech-label">RAM TOTAL:</span>
                <span id="res-ram">-- MB</span>
            </div>
            <div class="tech-line">
                <span class="tech-label">TOTAL SERVIDORES:</span>
                <span id="res-servidores">--</span>
            </div>
            <div class="tech-line">
                <span class="tech-label">TIEMPO ACTIVO:</span>
                <span id="res-uptime">--</span>
            </div>
        </div>
    </div>

    <div class="section-title">Historial de Consumo (RAM)</div>
    <div class="status-container" style="margin-bottom: 20px;">
        <div style="height: 220px; width: 100%;">
            <canvas id="ramChart"></canvas>
        </div>
    </div>

    <div class="section-title">Nodos de Clusters</div>
    <div class="status-container">
        <div id="status-grid" class="grid"></div>
    </div>

    <div class="section-title">Malla de Shards</div>
    <div class="status-container" style="margin-bottom: 40px;">
        <div id="shards-grid" class="grid"></div>
    </div>
</div>

<script>
let ramHistory = [];
let labelHistory = [];
let ramChart;

// --- FUNCIÓN DE TIEMPO CORREGIDA ---
function formatUptime(uptimeValue) {
    if (!uptimeValue || uptimeValue === "--") return "--";
    
    let ms;
    const now = Date.now();

    // Si el valor es un timestamp (ej. 1715123456789), restamos el tiempo actual
    // PM2 suele mandar el "pm_uptime" que es el momento en que arrancó.
    if (uptimeValue > 1000000000000) { 
        ms = now - uptimeValue; 
    } else {
        ms = parseInt(uptimeValue);
    }

    if (isNaN(ms) || ms < 0) return "--";

    let s = Math.floor(ms / 1000);
    let m = Math.floor(s / 60);
    let h = Math.floor(m / 60);
    let d = Math.floor(h / 24);

    if (d > 0) return `${d}d ${h % 24}h ${m % 60}m`;
    if (h > 0) return `${h}h ${m % 60}m`;
    if (m > 0) return `${m}m ${s % 60}s`;
    return `${s}s`;
}

// INICIALIZAR GRÁFICA
const ctx = document.getElementById('ramChart').getContext('2d');
ramChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: labelHistory,
        datasets: [{
            label: 'RAM (MB)',
            data: ramHistory,
            borderColor: '#00ffcc',
            backgroundColor: 'rgba(0, 255, 204, 0.1)',
            borderWidth: 2,
            fill: true,
            tension: 0.4,
            pointRadius: 0
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
            y: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#8e9297' } },
            x: { display: false }
        },
        plugins: { legend: { display: false } }
    }
});

async function updateStatus() {
    try {
        const res = await fetch('https://shoes-lamb-busy-anytime.trycloudflare.com/api/status?t=' + Date.now());
        const data = await res.json();

        if (data && data.clusters) {
            // 1. CÁLCULO DE UPTIME (CORREGIDO)
            // Intentamos sacar el uptime del cluster 0 o del objeto global
            const clusterCero = data.clusters[0];
            const rawUptime = data.uptime || (clusterCero && (clusterCero.uptime || clusterCero.pm_uptime)) || "--";
            
            document.getElementById('res-uptime').innerText = formatUptime(rawUptime);

            // 2. RAM Y SERVIDORES
            const totalRam = data.clusters.reduce((acc, c) => acc + (parseInt(c.ram) || 0), 0);
            const totalClusters = data.clusters.length;
            const clustersOnline = data.clusters.filter(c => c.status.toLowerCase() === 'online').length;
            
            document.getElementById('res-ram').innerText = totalRam.toLocaleString() + " MB";
            document.getElementById('stat-clusters').innerText = totalClusters;
            document.getElementById('stat-shards').innerText = `${clustersOnline} / ${totalClusters}`;
            document.getElementById('res-servidores').innerText = (data.global?.totalGuilds || 660).toLocaleString();

            // 3. GRÁFICA
            const now = new Date();
            ramHistory.push(totalRam);
            labelHistory.push(now.toLocaleTimeString());
            if(ramHistory.length > 30) { ramHistory.shift(); labelHistory.shift(); }
            ramChart.update();

            // 4. GRID CLUSTERS
            document.getElementById('status-grid').innerHTML = data.clusters.map(c => {
                const st = c.status.toLowerCase();
                let cl = st === 'online' ? 'online' : (st === 'connecting' ? 'warning' : 'offline');
                return `<div class="box ${cl}">${c.id}<div class="tooltip">Cluster ${c.id}<br>RAM: ${c.ram}MB<br>CPU: ${c.cpu || '0%'}</div></div>`;
            }).join('');

            // 5. GRID SHARDS
            document.getElementById('shards-grid').innerHTML = data.clusters.map(c => {
                const st = c.status.toLowerCase();
                let cl = st === 'online' ? 'online' : 'offline';
                return `<div class="box ${cl}">S${c.id}<div class="tooltip">Shard ${c.id}<br>Nodo: Cluster ${c.id}<br>Estado: ${st.toUpperCase()}</div></div>`;
            }).join('');
        }
    } catch (e) {
        console.error("Error en telemetría:", e);
        document.getElementById('res-uptime').innerText = "Error API";
    }
}

updateStatus();
setInterval(updateStatus, 5000);
</script>
</script>
</body>
</html>
