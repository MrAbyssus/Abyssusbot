<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssus Sentinel - Status Grid</title>
    <style>
        body { 
            background: #0f1012; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            padding: 40px; 
            margin: 0;
        }

        .container { max-width: 900px; margin: 0 auto; }

        h2 { font-size: 1.5rem; margin-bottom: 20px; border-bottom: 1px solid #2f3136; padding-bottom: 10px; }

        /* Leyenda de Colores */
        .legend { margin-bottom: 30px; font-size: 0.9rem; }
        .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }

        /* Grid de Cuadritos */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 8px;
            background: #18191c;
            padding: 20px;
            border-radius: 8px;
        }

        .cluster-box {
            aspect-ratio: 1 / 1;
            background: #2f3136; /* Color si está cargando */
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: rgba(255,255,255,0.8);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        /* Colores del Semáforo */
        .box-online { background: #23a55a !important; color: #fff; }
        .box-warning { background: #f0b232 !important; color: #000; }
        .box-offline { background: #f23f43 !important; color: #fff; }

        .cluster-box:hover { transform: scale(1.2); z-index: 10; box-shadow: 0 0 10px rgba(0,0,0,0.5); }

        /* Tooltip simple al pasar el mouse */
        .cluster-box:hover::after {
            content: attr(data-info);
            position: absolute;
            bottom: 125%;
            background: #000;
            padding: 5px 10px;
            border-radius: 4px;
            white-space: nowrap;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Estado de clusters</h2>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background:#23a55a"></div> El cluster está conectado.</div>
        <div class="legend-item"><div class="dot" style="background:#f0b232"></div> El cluster tiene problemas.</div>
        <div class="legend-item"><div class="dot" style="background:#f23f43"></div> El cluster está desconectado.</div>
    </div>

    <div id="grid-container" class="status-grid">
        </div>
</div>

<script>
    async function actualizarGrid() {
        try {
            const res = await fetch('https://shoes-lamb-busy-anytime.trycloudflare.com/api/status');
            const data = await res.json();
            const grid = document.getElementById('grid-container');

            if (data.clusters) {
                grid.innerHTML = data.clusters.map(c => {
                    const status = c.status.toLowerCase();
                    let colorClass = 'box-offline';
                    if (status === 'online') colorClass = 'box-online';
                    if (status === 'connecting' || status === 'reconnecting') colorClass = 'box-warning';

                    return `
                        <div class="cluster-box ${colorClass}" 
                             data-info="Cluster ${c.id} | RAM: ${c.ram}MB | Uptime: ${c.uptime}">
                            ${c.id}
                        </div>
                    `;
                }).join('');
            }
        } catch (e) {
            console.error("Error de conexión");
        }
    }

    actualizarGrid();
    setInterval(actualizarGrid, 5000);
</script>

</body>
</html>
