<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssus Bot - Estado de Red</title>
    <link rel="icon" href="img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-web.png">
    <style>
        :root {
            --bg: #0d0e12; 
            --panel: #14151b;
            --online: #33ff00; 
            --warning: #ffb86c;
            --offline: #ff5555;
            --text-main: #e2e4e9;
            --text-muted: #626772;
            --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.05);
        }

        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at 50% 0%, rgba(51, 255, 0, 0.07) 0%, transparent 70%);
            color: var(--text-main); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            padding: 100px 0 50px 0; 
            display: flex; 
            justify-content: center; 
        }

        .navbar { 
            position: fixed; top: 0; left: 0; width: 100%; 
            background: rgba(10, 11, 15, 0.9); 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid var(--border); 
            padding: 20px 0; z-index: 1000; 
            display: flex; justify-content: center;
        }

        .nav-logo { 
            color: white; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 5px; text-decoration: none; font-size: 1.4rem;
        }
        .nav-logo span { color: var(--online); }

        .container { width: 90%; max-width: 900px; display: flex; flex-direction: column; gap: 30px; }

        .section {
            background: var(--panel);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .section-title { 
            font-size: 0.8rem; font-weight: 800; margin-bottom: 20px; 
            color: var(--accent); text-transform: uppercase; letter-spacing: 2px;
            display: flex; align-items: center; gap: 10px;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .clear-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.65rem;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .clear-btn:hover { background: var(--offline); color: white; border-color: transparent; }

        .tech-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 15px; font-family: monospace;
        }
        .tech-item { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border-left: 3px solid var(--border); position: relative; }
        .tech-item b { display: block; color: var(--text-muted); font-size: 0.7rem; margin-bottom: 5px; text-transform: uppercase; }
        .tech-item span { font-size: 1.1rem; font-weight: bold; word-break: break-all; }
        
        /* Tendencia */
        .trend { font-size: 0.7rem; margin-left: 5px; vertical-align: middle; }
        .trend-up { color: var(--online); }
        .trend-down { color: var(--offline); }

        .chart-container { height: 220px; width: 100%; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); gap: 12px; }
        .box { 
            aspect-ratio: 1/1; background: rgba(255, 255, 255, 0.03); 
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; font-weight: bold; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1);
            position: relative; cursor: pointer;
        }
        .box:hover { transform: translateY(-5px); border-color: var(--online); background: rgba(51, 255, 0, 0.1); }

        .box.online::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 6px; border: 1px solid var(--online);
            animation: pulse 2s infinite; pointer-events: none; opacity: 0;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        .online { color: var(--online); border-color: rgba(51, 255, 0, 0.4); }
        .warning { color: var(--warning); border-color: var(--warning); }
        .offline { color: var(--offline); border-color: var(--offline); }

        .audit-log { 
            height: 160px; overflow-y: auto; font-family: 'Consolas', monospace; 
            font-size: 0.85rem; background: rgba(0,0,0,0.1); padding: 10px; border-radius: 8px;
            scroll-behavior: smooth;
        }
        .log-entry { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.02); display: flex; gap: 15px; }
        .log-time { color: var(--text-muted); min-width: 85px; }
        .log-msg-err { color: var(--offline); font-weight: bold; }
        .log-msg-ok { color: var(--online); }
        .log-msg-warn { color: var(--warning); }

        .refresh-area { text-align: right; font-size: 0.75rem; color: var(--text-muted); margin-top: -20px; font-family: monospace; }

        .box .tooltip { 
            visibility: hidden; width: 160px; background: #000; color: #fff; 
            border-radius: 6px; padding: 12px; position: absolute; z-index: 100; 
            bottom: 130%; left: 50%; transform: translateX(-50%); opacity: 0; 
            transition: 0.2s; font-size: 0.75rem; border: 1px solid var(--online); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.8); pointer-events: none; line-height: 1.4;
        }
        .box:hover .tooltip { visibility: visible; opacity: 1; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="navbar">
    <a href="https://mrabyssus.github.io/Abyssusbot/index.html" class="nav-logo">ABYSSUS <span>BOT</span></a>
</nav>

<div class="container">
    
    <section class="section">
        <div class="section-title">Estado Global del Sistema</div>
        <div class="tech-grid">
            <div class="tech-item"><b>Estado</b><span id="sistema-status">CONECTANDO</span></div>
            <div class="tech-item"><b>Uptime Global</b><span id="res-uptime">00d 00h 00m</span></div>
            <div class="tech-item"><b>Clusters</b><span id="stat-clusters">--</span></div>
            <div class="tech-item"><b>Servidores</b><span id="res-servidores">--</span><small id="trend-guilds" class="trend"></small></div>
            <div class="tech-item"><b>RAM Total</b><span id="res-ram">-- MB</span><small id="trend-ram" class="trend"></small></div>
            <div class="tech-item"><b>Latencia API</b><span id="res-ping">-- ms</span></div>
            <div class="tech-item"><b>Discord API</b><span id="discord-status">...</span></div>
        </div>
    </section>

    <div class="refresh-area">Próximo escaneo en: <span id="refresh-timer">3</span>s</div>

    <section class="section">
        <div class="section-title">Monitor de Rendimiento (RAM)</div>
        <div class="chart-container">
            <canvas id="ramChart"></canvas>
        </div>
    </section>

    <section class="section">
        <div class="section-title">Clusters</div>
        <div id="status-grid" class="grid"></div>
    </section>

    <section class="section">
        <div class="section-title">
            Registro de Eventos
            <button class="clear-btn" onclick="clearLogs()" style="margin-left: 10px;">Limpiar 🗑️</button>
        </div>
        <div class="audit-log" id="audit-log"></div>
    </section>

</div>

<script>
let ramHistory = [];
let labelHistory = [];
let ramChart;
let timeLeft = 3;
let lastPingTime = 0; 
let lastClustersState = []; 
let lastRamValue = 0;
let lastGuildsValue = 0;

const logBox = document.getElementById('audit-log');
const timerText = document.getElementById('refresh-timer');
const statusText = document.getElementById('sistema-status');
const discordText = document.getElementById('discord-status');

function parseUptime(value) {
    if (typeof value === 'number') return value;
    if (typeof value !== 'string') return 0;
    const val = parseFloat(value);
    if (value.includes('d')) return val * 86400000;
    if (value.includes('h')) return val * 3600000;
    if (value.includes('m')) return val * 60000;
    if (value.includes('s')) return val * 1000;
    return val; 
}

function formatUptime(ms) {
    if (isNaN(ms) || ms <= 0) return "00d 00h 00m";
    let s = Math.floor(ms / 1000);
    const d = Math.floor(s / (3600 * 24));
    s %= (3600 * 24);
    const h = Math.floor(s / 3600);
    s %= 3600;
    const m = Math.floor(s / 60);
    return `${d.toString().padStart(2, '0')}d ${h.toString().padStart(2, '0')}h ${m.toString().padStart(2, '0')}m`;
}

function addLog(msg, type = '') {
    const time = new Date().toLocaleTimeString();
    const entryData = { time, msg, type };
    let storedLogs = JSON.parse(localStorage.getItem('abyssus_logs') || '[]');
    storedLogs.push(entryData); // Push al final para orden cronológico
    if(storedLogs.length > 50) storedLogs.shift(); 
    localStorage.setItem('abyssus_logs', JSON.stringify(storedLogs));
    renderLogs(true);
}

function renderLogs(shouldScroll = false) {
    const storedLogs = JSON.parse(localStorage.getItem('abyssus_logs') || '[]');
    logBox.innerHTML = storedLogs.map(log => {
        let colorClass = '';
        if(log.type === 'err') colorClass = 'log-msg-err';
        else if(log.type === 'ok') colorClass = 'log-msg-ok';
        else if(log.type === 'warn') colorClass = 'log-msg-warn';
        return `<div class="log-entry"><span class="log-time">[${log.time}]</span> <span class="${colorClass}">${log.msg}</span></div>`;
    }).join('');
    
    if(shouldScroll) {
        logBox.scrollTop = logBox.scrollHeight;
    }
}

function clearLogs() {
    if(confirm('¿Borrar historial?')) {
        localStorage.removeItem('abyssus_logs');
        addLog("Historial vaciado.", "warn");
    }
}

function updateTrends(currentRam, currentGuilds) {
    const rTrend = document.getElementById('trend-ram');
    const gTrend = document.getElementById('trend-guilds');

    if(lastRamValue > 0) {
        if(currentRam > lastRamValue) rTrend.innerHTML = '▲', rTrend.className = 'trend trend-up';
        else if(currentRam < lastRamValue) rTrend.innerHTML = '▼', rTrend.className = 'trend trend-down';
    }
    if(lastGuildsValue > 0) {
        if(currentGuilds > lastGuildsValue) gTrend.innerHTML = '▲', gTrend.className = 'trend trend-up';
        else if(currentGuilds < lastGuildsValue) gTrend.innerHTML = '▼', gTrend.className = 'trend trend-down';
    }
    lastRamValue = currentRam;
    lastGuildsValue = currentGuilds;
}

function initChart() {
    const ctx = document.getElementById('ramChart');
    ramChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labelHistory,
            datasets: [{
                label: 'RAM',
                data: ramHistory,
                borderColor: '#33ff00', 
                backgroundColor: 'rgba(51, 255, 0, 0.05)',
                fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#626772', font: { size: 10 } } },
                x: { display: false }
            }
        }
    });
}

async function update() {
    const start = Date.now();
    try {
        fetch('https://discordstatus.com/api/v2/summary.json')
            .then(r => r.json()).then(d => {
                const hasIncident = d.incidents.length > 0;
                discordText.innerText = hasIncident ? "ALERTA" : d.status.description.toUpperCase();
                discordText.style.color = hasIncident ? "#ffb86c" : "#33ff00";
            });

        const res = await fetch('https://survivors-outlet-boolean-aquarium.trycloudflare.com/api/status?t=' + Date.now());
        const data = await res.json();
        
        const currentPing = Date.now() - start;
        document.getElementById('res-ping').innerText = currentPing + " ms";
        statusText.innerText = "ONLINE"; statusText.style.color = "#33ff00";

        if (data.global?.uptime) {
            document.getElementById('res-uptime').innerText = formatUptime(parseUptime(data.global.uptime));
        }

        const clusters = data.clusters || [];
        const totalRam = clusters.reduce((acc, c) => acc + (parseFloat(c.ram || 0)), 0);
        const totalGuilds = data.global?.totalGuilds || 0;

        updateTrends(totalRam, totalGuilds);
        
        document.getElementById('res-ram').innerText = totalRam.toFixed(1) + " MB";
        document.getElementById('res-servidores').innerText = totalGuilds.toLocaleString();
        document.getElementById('stat-clusters').innerText = `${clusters.filter(c => c.status === 'online').length} / ${clusters.length}`;

        document.getElementById('status-grid').innerHTML = clusters.map(c => {
            const s = (c.status || 'offline').toLowerCase();
            const cl = s === 'online' ? 'online' : (s === 'connecting' ? 'warning' : 'offline');
            return `<div class="box ${cl}">${c.id}<div class="tooltip"><b>CLUSTER #${c.id}</b><br>• ${s.toUpperCase()}<br>• RAM: ${c.ram}MB</div></div>`;
        }).join('');

        if (ramChart) {
            ramHistory.push(totalRam); labelHistory.push("");
            if(ramHistory.length > 40) { ramHistory.shift(); labelHistory.shift(); }
            ramChart.update();
        }
    } catch (e) {
        statusText.innerText = "OFFLINE"; statusText.style.color = "#ff5555";
    }
}

document.addEventListener('DOMContentLoaded', () => {
    initChart(); renderLogs(true); update();
    setInterval(() => {
        timeLeft -= 0.1;
        if (timeLeft <= 0) { timeLeft = 3; update(); }
        timerText.innerText = Math.ceil(timeLeft);
    }, 100);
});
</script>
</body>
</html>
