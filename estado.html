<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssus Sentinel - Panel de Estado</title>
    <style>
        body { 
            background: #0f1012; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-top: 60px;
        }

        .container { 
            width: 90%;
            max-width: 1000px; /* Limitamos el ancho para que no se desparrame en pantallas 4K */
            text-align: center;
        }

        h2 { 
            font-size: 2rem; 
            margin-bottom: 40px; 
            letter-spacing: 2px;
            color: #00ffcc;
            text-transform: uppercase;
        }

        /* Caja contenedora del Panel */
        .status-panel {
            background: #18191c;
            border-radius: 15px;
            padding: 40px;
            border: 1px solid #2f3136;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Leyenda Centrada */
        .legend { 
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
        }
        .legend-item { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; color: #949ba4; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }

        /* Grid de Cuadritos Centrado y Proporcionado */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr)); /* Cuadros un poco más grandes */
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .cluster-box {
            aspect-ratio: 1 / 1;
            background: #2f3136;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 2px solid transparent;
        }

        /* Colores del Semáforo con Brillo (Glow) */
        .box-online { 
            background: rgba(35, 165, 90, 0.2) !important; 
            border-color: #23a55a !important; 
            color: #23a55a;
            box-shadow: 0 0 10px rgba(35, 165, 90, 0.2);
        }
        .box-warning { 
            background: rgba(240, 178, 50, 0.2) !important; 
            border-color: #f0b232 !important; 
            color: #f0b232;
        }
        .box-offline { 
            background: rgba(242, 63, 67, 0.2) !important; 
            border-color: #f23f43 !important; 
            color: #f23f43;
        }

        .cluster-box:hover { 
            transform: translateY(-5px) scale(1.1); 
            z-index: 10; 
            background: rgba(255,255,255,0.1) !important;
            color: #fff;
        }

        /* Info del Cluster (Debajo del número) */
        .cluster-id { font-size: 1.1rem; }
        .cluster-label { font-size: 0.5rem; text-transform: uppercase; opacity: 0.7; }

    </style>
</head>
<body>

<div class="container">
    <h2>Abyssus Sentinel Core</h2>

    <div class="status-panel">
        <div class="legend">
            <div class="legend-item"><div class="dot" style="background:#23a55a"></div> Operativo</div>
            <div class="legend-item"><div class="dot" style="background:#f0b232"></div> Reconectando</div>
            <div class="legend-item"><div class="dot" style="background:#f23f43"></div> Fuera de línea</div>
        </div>

        <div id="grid-container" class="status-grid">
            </div>
    </div>
    
    <p style="margin-top: 30px; color: #4f545c; font-size: 0.8rem;">
        Actualización automática cada 5 segundos • Nodo: OVH Cloud
    </p>
</div>

<script>
    async function actualizarGrid() {
        try {
            const res = await fetch('https://shoes-lamb-busy-anytime.trycloudflare.com/api/status');
            const data = await res.json();
            const grid = document.getElementById('grid-container');

            if (data.clusters) {
                grid.innerHTML = data.clusters.map(c => {
                    const status = c.status.toLowerCase();
                    let colorClass = 'box-offline';
                    if (status === 'online') colorClass = 'box-online';
                    if (status === 'connecting' || status === 'reconnecting') colorClass = 'box-warning';

                    return `
                        <div class="cluster-box ${colorClass}">
                            <span class="cluster-label">ID</span>
                            <span class="cluster-id">${c.id}</span>
                        </div>
                    `;
                }).join('');
            }
        } catch (e) {
            console.error("Error de conexión");
        }
    }

    actualizarGrid();
    setInterval(actualizarGrid, 5000);
</script>

</body>
</html>
