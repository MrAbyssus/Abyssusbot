<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssus Sentinel - Status Grid Pro</title>
    <link rel="icon" href="img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-web.png">
    <style>
        :root {
            --bg: #16171d;
            --panel: #1c1d24;
            --online: #43b581;
            --warning: #faa61a;
            --offline: #f04747;
            --text-main: #dcddde;
            --text-muted: #8e9297;
            --accent: #00ffcc;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding-top: 100px;
            display: flex;
            justify-content: center;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 16, 18, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #2f3136;
            padding: 15px 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
        }
        .nav-content { width: 90%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { color: var(--accent); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; font-size: 1.1rem; }

        /* ESTRUCTURA */
        .container { width: 90%; max-width: 1000px; padding: 20px; display: flex; flex-direction: column; }
        .section-title { font-size: 1.5rem; font-weight: bold; margin: 30px 0 15px 0; border-bottom: 1px solid #2f3136; padding-bottom: 10px; color: var(--accent); }
        .resumen-box { margin-bottom: 20px; }
        
        .tech-info { 
            background: #0c0d12; 
            padding: 15px 20px; 
            border-radius: 5px; 
            display: block; 
            max-width: fit-content;
            margin-top: 15px; 
            font-family: 'Courier New', monospace;
            border-left: 4px solid var(--accent);
        }
        .tech-line { display: flex; gap: 15px; color: var(--accent); font-weight: bold; margin-bottom: 5px; }
        .tech-label { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; width: 140px; display: inline-block; }

        .status-container { background: var(--panel); border-radius: 8px; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 100%; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(38px, 1fr)); gap: 8px; }
        .box {
            aspect-ratio: 1/1; background: #2f3136; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: bold; position: relative;
            cursor: pointer; transition: transform 0.1s;
        }
        .box:hover { transform: scale(1.2); z-index: 10; }
        .online { color: var(--online); border: 1px solid var(--online); }
        .warning { color: var(--warning); border: 1px solid var(--warning); }
        .offline { color: var(--offline); border: 1px solid var(--offline); }

        .box .tooltip {
            visibility: hidden; width: 160px; background: #000; color: #fff;
            text-align: left; border-radius: 4px; padding: 10px;
            position: absolute; z-index: 100; bottom: 125%; left: 50%;
            margin-left: -80px; opacity: 0; transition: opacity 0.2s;
            font-size: 0.75rem; border: 1px solid #333; pointer-events: none;
        }
        .box:hover .tooltip { visibility: visible; opacity: 1; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="navbar">
    <div class="nav-content">
        <a href="#" class="nav-logo">ABYSSUS SENTINEL</a>
    </div>
</nav>
      
<div class="container">
    <div class="section-title">Resumen del Sistema</div>
    <div class="resumen-box">
        <div class="tech-info">
            <div class="tech-line"><span class="tech-label">TIEMPO ACTIVO:</span> <span id="res-uptime">Cargando...</span></div>
            <div class="tech-line"><span class="tech-label">RAM TOTAL:</span> <span id="res-ram">-- MB</span></div>
            <div class="tech-line"><span class="tech-label">SERVIDORES:</span> <span id="res-servidores">--</span></div>
            <div class="tech-line"><span class="tech-label">CLUSTERS:</span> <span id="stat-clusters">--</span></div>
        </div>
    </div>

    <div class="section-title">Historial de RAM (MB)</div>
    <div class="status-container" style="margin-bottom: 20px;">
        <div style="height: 200px; width: 100%;"><canvas id="ramChart"></canvas></div>
    </div>

    <div class="section-title">Nodos de Clusters</div>
    <div class="status-container" style="margin-bottom: 20px;">
        <div id="status-grid" class="grid"></div>
    </div>

    <div class="section-title">Malla de Shards</div>
    <div class="status-container" style="margin-bottom: 40px;">
        <div id="shards-grid" class="grid"></div>
    </div>
</div>

<script>
let ramHistory = [];
let labelHistory = [];
let ramChart;

// --- LÓGICA DE TIEMPO REFORZADA ---
function formatUptime(uptimeValue) {
    if (!uptimeValue || uptimeValue === "--") return "Iniciando...";
    
    let ms;
    const now = Date.now();

    // PM2 devuelve el Epoch de inicio (ej. 1715123456789).
    // Si el valor es mayor a un año 2020 en ms, es un timestamp de inicio.
    if (uptimeValue > 1577836800000) { 
        ms = now - uptimeValue; 
    } else {
        ms = parseInt(uptimeValue);
    }

    if (isNaN(ms) || ms < 0) return "Sincronizando...";

    let s = Math.floor(ms / 1000);
    let m = Math.floor(s / 60);
    let h = Math.floor(m / 60);
    let d = Math.floor(h / 24);

    let parts = [];
    if (d > 0) parts.push(`${d}d`);
    if (h % 24 > 0) parts.push(`${h % 24}h`);
    if (m % 60 > 0) parts.push(`${m % 60}m`);
    if (s % 60 > 0 && d === 0) parts.push(`${s % 60}s`);

    return parts.length > 0 ? parts.join(' ') : '0s';
}

const ctx = document.getElementById('ramChart').getContext('2d');
ramChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: labelHistory,
        datasets: [{
            data: ramHistory,
            borderColor: '#00ffcc',
            backgroundColor: 'rgba(0, 255, 204, 0.1)',
            fill: true,
            tension: 0.4,
            pointRadius: 0
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: { x: { display: false }, y: { ticks: { color: '#8e9297' }, grid: { color: 'rgba(255,255,255,0.05)' } } },
        plugins: { legend: { display: false } }
    }
});

async function updateStatus() {
    try {
        const res = await fetch('https://shoes-lamb-busy-anytime.trycloudflare.com/api/status?t=' + Date.now());
        const data = await res.json();

        if (data && data.clusters) {
            // 1. BÚSQUEDA PROFUNDA DE UPTIME
            const c0 = data.clusters[0];
            const rawUptime = data.uptime || 
                              (c0 && c0.pm_uptime) || 
                              (c0 && c0.uptime) || 
                              (data.global && data.global.uptime) || "--";
            
            document.getElementById('res-uptime').innerText = formatUptime(rawUptime);

            // 2. DATOS GENERALES
            const totalRam = data.clusters.reduce((acc, c) => acc + (parseInt(c.ram) || 0), 0);
            document.getElementById('res-ram').innerText = totalRam.toLocaleString() + " MB";
            document.getElementById('stat-clusters').innerText = data.clusters.length;
            document.getElementById('res-servidores').innerText = (data.global?.totalGuilds || "660").toLocaleString();

            // 3. GRÁFICA
            ramHistory.push(totalRam);
            labelHistory.push(new Date().toLocaleTimeString());
            if(ramHistory.length > 30) { ramHistory.shift(); labelHistory.shift(); }
            ramChart.update();

            // 4. NODOS CLUSTERS
            document.getElementById('status-grid').innerHTML = data.clusters.map(c => {
                const st = c.status.toLowerCase();
                const color = st === 'online' ? 'online' : 'offline';
                return `<div class="box ${color}">${c.id}<div class="tooltip">Cluster ${c.id}<br>RAM: ${c.ram}MB</div></div>`;
            }).join('');

            // 5. MALLA SHARDS
            document.getElementById('shards-grid').innerHTML = data.clusters.map(c => {
                const color = c.status.toLowerCase() === 'online' ? 'online' : 'offline';
                return `<div class="box ${color}">S${c.id}<div class="tooltip">Shard ${c.id}<br>Nodo: Cluster ${c.id}</div></div>`;
            }).join('');
        }
    } catch (e) {
        console.error("Error API:", e);
    }
}

setInterval(updateStatus, 5000);
updateStatus();
</script>
</body>
</html>
