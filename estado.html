<script>
let ramHistory = [];
let labelHistory = [];
let ramChart;
let timeLeft = 3;
let lastPingTime = 0; 
let lastClustersState = {}; 
let lastRamValue = 0;
let lastGuildsValue = 0;

const logBox = document.getElementById('audit-log');
const timerText = document.getElementById('refresh-timer');
const statusText = document.getElementById('sistema-status');
const discordText = document.getElementById('discord-status');

function parseUptime(value) {
    if (typeof value === 'number') return value;
    if (typeof value !== 'string') return 0;
    const val = parseFloat(value);
    if (value.includes('d')) return val * 86400000;
    if (value.includes('h')) return val * 3600000;
    if (value.includes('m')) return val * 60000;
    if (value.includes('s')) return val * 1000;
    return val; 
}

function formatUptime(ms) {
    if (isNaN(ms) || ms <= 0) return "00d 00h";
    let s = Math.floor(ms / 1000);
    const d = Math.floor(s / (3600 * 24));
    s %= (3600 * 24);
    const h = Math.floor(s / 3600);
    return `${d.toString().padStart(2, '0')}d ${h.toString().padStart(2, '0')}h`;
}

function addLog(msg, type = '') {
    const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
    const entryData = { time, msg, type };
    let storedLogs = JSON.parse(localStorage.getItem('abyssus_logs') || '[]');
    storedLogs.push(entryData);
    if(storedLogs.length > 50) storedLogs.shift(); 
    localStorage.setItem('abyssus_logs', JSON.stringify(storedLogs));
    
    const isAtBottom = logBox.scrollHeight - logBox.clientHeight <= logBox.scrollTop + 40;
    renderLogs(isAtBottom);
}

function renderLogs(shouldScroll = false) {
    const storedLogs = JSON.parse(localStorage.getItem('abyssus_logs') || '[]');
    logBox.innerHTML = storedLogs.map(log => {
        let colorClass = '';
        if(log.type === 'err') colorClass = 'log-msg-err';
        else if(log.type === 'ok') colorClass = 'log-msg-ok';
        else if(log.type === 'warn') colorClass = 'log-msg-warn';
        return `<div class="log-entry"><span class="log-time">[${log.time}]</span> <span class="${colorClass}">${log.msg}</span></div>`;
    }).join('');
    if(shouldScroll) logBox.scrollTop = logBox.scrollHeight;
}

function clearLogs() {
    if(confirm('¿Borrar historial?')) {
        localStorage.removeItem('abyssus_logs');
        logBox.innerHTML = '';
        addLog("Historial vaciado.", "warn");
    }
}

function updateTrends(currentRam, currentGuilds) {
    const rTrend = document.getElementById('trend-ram');
    const gTrend = document.getElementById('trend-guilds');

    if(lastRamValue > 0) {
        if(currentRam > lastRamValue) rTrend.innerHTML = '▲', rTrend.className = 'trend trend-up';
        else if(currentRam < lastRamValue) rTrend.innerHTML = '▼', rTrend.className = 'trend trend-down';
    }
    if(lastGuildsValue > 0) {
        if(currentGuilds > lastGuildsValue) gTrend.innerHTML = '▲', gTrend.className = 'trend trend-up';
        else if(currentGuilds < lastGuildsValue) gTrend.innerHTML = '▼', gTrend.className = 'trend trend-down';
    }
    lastRamValue = currentRam;
    lastGuildsValue = currentGuilds;
}

// 🛠️ CONFIGURACIÓN AVANZADA DE LA GRÁFICA CON CUSTOM TOOLTIPS E INTERACTIVIDAD
function initChart() {
    const ctx = document.getElementById('ramChart');
    ramChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labelHistory,
            datasets: [{
                label: 'RAM',
                data: ramHistory,
                borderColor: '#33ff00', 
                backgroundColor: 'rgba(51, 255, 0, 0.04)', // Un degradado sutil e impecable
                fill: true, 
                tension: 0.4, 
                pointRadius: 0, 
                pointHoverRadius: 5, // Muestra un pequeño punto al pasar el cursor sobre la línea
                pointHoverBackgroundColor: '#33ff00',
                borderWidth: 2
            }]
        },
        options: {
            responsive: true, 
            maintainAspectRatio: false,
            interaction: {
                mode: 'index',
                intersect: false // Permite que el tooltip aparezca sin tener que tocar milimétricamente la línea
            },
            plugins: { 
                legend: { display: false },
                tooltip: {
                    backgroundColor: '#0a0b0f',
                    titleColor: '#ffffff',
                    bodyColor: '#e2e4e9',
                    borderColor: '#33ff00',
                    borderWidth: 1,
                    padding: 10,
                    displayColors: false,
                    callbacks: {
                        // Customización del título del Tooltip (Ponemos la hora del scan)
                        title: function(context) {
                            return `🕒 Registro: ${context[0].raw.hora}`;
                        },
                        // Extracción de metadatos guardados sin romper la línea base
                        label: function(context) {
                            const dataRaw = context.raw;
                            let lineas = [];
                            lineas.push(`📊 RAM Total: ${dataRaw.y.toFixed(1)} MB`);
                            lineas.push(`⚡ Clusters Activos: ${dataRaw.activos} / ${dataRaw.totales}`);
                            lineas.push(`🌐 Servidores: ${dataRaw.servidores.toLocaleString()}`);
                            
                            if (dataRaw.pingApi) {
                                lineas.push(`📶 Ping API Web: ${dataRaw.pingApi}`);
                            }
                            return lineas;
                        }
                    }
                }
            },
            scales: {
                y: { grid: { color: 'rgba(255,255,255,0.02)' }, ticks: { color: '#626772', font: { size: 10 } } },
                x: { display: false }
            }
        }
    });
}

async function update() {
    const start = Date.now();
    try {
        fetch('https://discordstatus.com/api/v2/summary.json')
            .then(r => r.json()).then(d => {
                const hasIncident = d.incidents.length > 0;
                discordText.innerText = hasIncident ? "ALERTA" : d.status.description.toUpperCase();
                discordText.style.color = hasIncident ? "#ffb86c" : "#33ff00";
            });

        const res = await fetch('https://survivors-outlet-boolean-aquarium.trycloudflare.com/api/status?t=' + Date.now());
        const data = await res.json();
        
        const currentPing = Date.now() - start;
        document.getElementById('res-ping').innerText = currentPing + " ms";

        if (statusText.innerText === "REINICIANDO" || statusText.innerText === "OFFLINE") {
            addLog("Conexión reestablecida con el servidor de estado.", "ok");
        }
        statusText.innerText = "ONLINE"; statusText.style.color = "#33ff00";

        if (data.global?.uptime) {
            document.getElementById('res-uptime').innerText = formatUptime(parseUptime(data.global.uptime));
        }

        let rawClusters = data.clusters || [];
        rawClusters.sort((a, b) => a.id - b.id);

        const clusters = rawClusters.map((c, index) => {
            return {
                id: index + 1, 
                idOriginal: c.id,
                status: c.status,
                ram: c.ram,
                cpu: c.cpu,
                ping: (c.ping === undefined || c.ping < 0) ? '--' : c.ping,
                guilds: c.guilds || c.servers || 0
            };
        });

        const totalRam = clusters.reduce((acc, c) => acc + (parseFloat(c.ram || 0)), 0);
        const totalGuilds = data.global?.totalGuilds || 0;
        const clustersOnline = clusters.filter(c => c.status === 'online').length;

        updateTrends(totalRam, totalGuilds);
        
        document.getElementById('res-ram').innerText = totalRam.toFixed(1) + " MB";
        document.getElementById('stat-clusters').innerText = `${clustersOnline} / ${clusters.length}`;

        let servidoresPerdidosTotales = 0;
        
        clusters.forEach(c => {
            const statusActual = (c.status || 'offline').toLowerCase();
            const statusPrevio = lastClustersState[c.id];

            if (statusActual !== 'online') {
                let perdidosEsteCluster = c.guilds;
                if (!perdidosEsteCluster && totalGuilds > 0 && clusters.length > 0) {
                    perdidosEsteCluster = Math.round(totalGuilds / clusters.length);
                }
                servidoresPerdidosTotales += perdidosEsteCluster;
            }

            if (statusPrevio && statusPrevio !== statusActual) {
                if (statusActual === 'online') {
                    addLog(`Cluster #${c.id} restablecido exitosamente (ONLINE).`, "ok");
                } else if (statusActual === 'connecting') {
                    addLog(`Cluster #${c.id} está intentando conectarse a Discord.`, "warn");
                } else {
                    let servidoresPerdidos = c.guilds;
                    if (!servidoresPerdidos && totalGuilds > 0 && clusters.length > 0) {
                        servidoresPerdidos = Math.round(totalGuilds / clusters.length);
                    }
                    const formatLost = servidoresPerdidos > 0 ? ` [~${servidoresPerdidos.toLocaleString()} servidores afectados]` : '';
                    addLog(`Cluster #${c.id} se encuentra inactivo (OFFLINE).${formatLost}`, "err");
                }
            }
            lastClustersState[c.id] = statusActual;
        });

        const perdidosContainer = document.getElementById('res-perdidos');
        if (servidoresPerdidosTotales > 0) {
            perdidosContainer.innerText = servidoresPerdidosTotales.toLocaleString();
            perdidosContainer.style.color = "var(--offline)"; 
        } else {
            perdidosContainer.innerText = "0";
            perdidosContainer.style.color = "var(--online)"; 
        }

        document.getElementById('res-servidores').innerText = totalGuilds.toLocaleString();

        document.getElementById('status-grid').innerHTML = clusters.map(c => {
            const s = (c.status || 'offline').toLowerCase();
            const cl = s === 'online' ? 'online' : (s === 'connecting' ? 'warning' : 'offline');
            const ramValue = parseFloat(c.ram || 0).toFixed(0);
            const guildInfo = c.guilds ? `<br>• Servers: ${c.guilds.toLocaleString()}` : '';
            
            return `<div class="box ${cl}">
                <span>${c.id}</span>
                <span class="box-ram">${ramValue}M</span>
                <div class="tooltip"><b>CLUSTER #${c.id}</b><br>• ${s.toUpperCase()}<br>• RAM: ${c.ram}MB<br>• Ping: ${c.ping}ms${guildInfo}</div>
            </div>`;
        }).join('');

        // 📈 AQUÍ SE HACE LA MAGIA DE LA GRÁFICA AVANZADA
        if (ramChart) {
            const horaActual = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            
            // Construimos un objeto completo en lugar de pasar solo el número totalRam
            const puntoGrafica = {
                y: totalRam,              // Valor del eje Y obligatorio para Chart.js
                hora: horaActual,         // Se leerá en el título del tooltip
                activos: clustersOnline,  // Clústeres estables
                totales: clusters.length, // Clústeres totales configurados
                servidores: totalGuilds,  // El número exacto de servidores en ese segundo
                pingApi: currentPing + " ms"
            };

            ramHistory.push(puntoGrafica); 
            labelHistory.push(horaActual); // Añadimos la etiqueta de tiempo real
            
            // Mantenemos un tamaño saludable de 40 muestras en caché de pantalla
            if(ramHistory.length > 40) { 
                ramHistory.shift(); 
                labelHistory.shift(); 
            }
            ramChart.update();
        }
    } catch (e) {
        if (statusText.innerText !== "REINICIANDO") {
            addLog("El servidor no responde. Posible actualización o mantenimiento.", "warn");
        }
        statusText.innerText = "REINICIANDO"; 
        statusText.style.color = "var(--warning)";
        document.getElementById('res-ping').innerText = "-- ms";
    }
}

document.addEventListener('DOMContentLoaded', () => {
    initChart(); renderLogs(true); update();
    setInterval(() => {
        timeLeft -= 0.1;
        if (timeLeft <= 0) { timeLeft = 3; update(); }
        timerText.innerText = Math.ceil(timeLeft);
    }, 100);
});
</script>
