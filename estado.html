<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssus Sentinel - Full Status</title>
    <style>
        :root {
            --bg: #16171d; --panel: #1c1d24; --online: #43b581; --warning: #faa61a;
            --offline: #f04747; --text-main: #dcddde; --text-muted: #8e9297; --accent: #00ffcc;
        }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding-top: 90px; display: flex; justify-content: center; }
        
        .navbar { position: fixed; top: 0; width: 100%; background: rgba(15, 16, 18, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #2f3136; padding: 15px 0; z-index: 1000; text-align: center; }
        .nav-logo { color: var(--accent); font-weight: bold; letter-spacing: 3px; font-size: 1.2rem; }

        .container { width: 90%; max-width: 1000px; padding: 20px; }
        .section-title { font-size: 1.3rem; font-weight: bold; margin: 30px 0 15px; border-bottom: 1px solid #2f3136; padding-bottom: 8px; color: var(--accent); }
        
        .tech-info { background: #0c0d12; padding: 20px; border-radius: 8px; border-left: 4px solid var(--accent); font-family: 'Courier New', monospace; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .tech-item b { color: var(--text-muted); font-size: 0.8rem; display: block; text-transform: uppercase; }
        .tech-item span { font-size: 1.1rem; color: #fff; }

        .status-container { background: var(--panel); border-radius: 10px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 10px; }
        .box { 
            aspect-ratio: 1/1; background: #2f3136; border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 0.9rem; font-weight: bold; border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease; position: relative;
        }
        .box:hover { transform: translateY(-3px); filter: brightness(1.2); }

        .online { color: var(--online); border-color: var(--online); background: rgba(67, 181, 129, 0.05); }
        .offline { color: var(--offline); border-color: var(--offline); background: rgba(240, 71, 71, 0.05); }
        .warning { color: var(--warning); border-color: var(--warning); background: rgba(250, 166, 26, 0.05); }
        
        #conexion-msg { font-size: 0.8rem; margin-top: 5px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="navbar">
    <div class="nav-logo">ABYSSUS SENTINEL</div>
    <div id="conexion-msg">Cargando telemetría...</div>
</nav>
      
<div class="container">
    <div class="section-title">Resumen de Hardware & Red</div>
    <div class="status-container">
        <div class="tech-info">
            <div class="tech-item"><b>Uso de Memoria RAM</b><span id="res-ram">-- MB</span></div>
            <div class="tech-item"><b>Servidores Activos</b><span id="res-servidores">--</span></div>
            <div class="tech-item"><b>Tiempo de Actividad</b><span id="res-uptime">--</span></div>
            <div class="tech-item"><b>Salud de Shards</b><span id="stat-shards">-- / --</span></div>
        </div>
    </div>

    <div class="section-title">Monitor de Recursos (RAM)</div>
    <div class="status-container">
        <div style="height: 200px;"><canvas id="ramChart"></canvas></div>
    </div>

    <div class="section-title">Estado de Nodos (Clusters)</div>
    <div id="status-grid" class="grid"></div>

    <div class="section-title">Malla de Shards Individuales</div>
    <div id="shards-grid" class="grid"></div>
</div>

<script>
let ramHistory = []; let labelHistory = []; let ramChart;

function formatUptime(value) {
    if (!value || value === "--") return "Calculando...";
    let n = Number(value);
    if (isNaN(n)) return value;
    let ms = (n > 1000000000000) ? Date.now() - n : n;
    let s = Math.floor(ms / 1000);
    let m = Math.floor(s / 60);
    let h = Math.floor(m / 60);
    let d = Math.floor(h / 24);
    if (d > 0) return `${d}d ${h % 24}h`;
    return h > 0 ? `${h}h ${m % 60}m` : `${m}m ${s % 60}s`;
}

// Inicializar Chart
const ctx = document.getElementById('ramChart').getContext('2d');
ramChart = new Chart(ctx, {
    type: 'line',
    data: { labels: labelHistory, datasets: [{ data: ramHistory, borderColor: '#00ffcc', backgroundColor: 'rgba(0,255,204,0.1)', fill: true, tension: 0.4, pointRadius: 0 }] },
    options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { grid: { color: '#2f3136' }, ticks: { color: '#8e9297' } } }, plugins: { legend: { display: false } } }
});

async function updateStatus() {
    try {
        const url = 'https://volt-nhs-entering-compiled.trycloudflare.com/status?t=' + Date.now();
        const res = await fetch(url);
        if(!res.ok) throw new Error();
        const data = await res.json();

        if (data && data.clusters) {
            // 1. Datos de Texto
            const totalRam = data.clusters.reduce((acc, c) => acc + (parseInt(c.ram) || 0), 0);
            const onlineCount = data.clusters.filter(c => c.status === 'online').length;

            document.getElementById('res-ram').innerText = totalRam.toLocaleString() + " MB";
            document.getElementById('res-servidores').innerText = (data.global?.totalGuilds || 0).toLocaleString();
            document.getElementById('stat-shards').innerText = `${onlineCount} / ${data.clusters.length}`;
            document.getElementById('res-uptime').innerText = formatUptime(data.uptime || data.clusters[0]?.uptime);
            document.getElementById('conexion-msg').innerHTML = '<span style="color:#43b581">● SISTEMA CONECTADO</span>';

            // 2. Gráfica
            ramHistory.push(totalRam);
            labelHistory.push(new Date().toLocaleTimeString());
            if(ramHistory.length > 30) { ramHistory.shift(); labelHistory.shift(); }
            ramChart.update();

            // 3. Grids de Clusters y Shards
            const htmlNodes = data.clusters.map(c => {
                const st = c.status.toLowerCase();
                const cl = st === 'online' ? 'online' : (st === 'connecting' ? 'warning' : 'offline');
                return `<div class="box ${cl}">${c.id}</div>`;
            }).join('');

            document.getElementById('status-grid').innerHTML = htmlNodes;
            document.getElementById('shards-grid').innerHTML = data.clusters.map(c => {
                const cl = c.status === 'online' ? 'online' : 'offline';
                return `<div class="box ${cl}">S${c.id}</div>`;
            }).join('');
        }
    } catch (e) {
        document.getElementById('conexion-msg').innerHTML = '<span style="color:#f04747">● FALLO DE TELEMETRÍA (REINTENTANDO)</span>';
    }
}

setInterval(updateStatus, 5000);
updateStatus();
</script>
</body>
</html>
