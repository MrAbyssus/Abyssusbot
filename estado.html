<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssus Sentinel - Status Grid Pro</title>
    <link rel="icon" href="img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-web.png">
    <style>
        :root {
            --bg: #16171d;
            --panel: #1c1d24;
            --online: #43b581;
            --warning: #faa61a;
            --offline: #f04747;
            --text-main: #dcddde;
            --text-muted: #8e9297;
            --accent: #00ffcc;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding-top: 100px;
            display: flex;
            justify-content: center;
        }

        .navbar {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(15, 16, 18, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid #2f3136; padding: 15px 0; z-index: 1000;
            display: flex; justify-content: center;
        }
        .nav-content { width: 90%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { color: var(--accent); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; font-size: 1.1rem; }

        .container { width: 90%; max-width: 1000px; padding: 20px; display: flex; flex-direction: column; }
        .section-title { font-size: 1.5rem; font-weight: bold; margin: 30px 0 15px 0; border-bottom: 1px solid #2f3136; padding-bottom: 10px; }
        
        .tech-info { 
            background: #0c0d12; padding: 15px 20px; border-radius: 5px; 
            display: block; max-width: fit-content; margin-top: 15px; 
            font-family: 'Courier New', monospace; border-left: 4px solid var(--accent);
        }
        .tech-line { display: flex; gap: 15px; color: var(--accent); font-weight: bold; }
        .tech-label { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }

        .status-container { background: var(--panel); border-radius: 8px; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 100%; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(38px, 1fr)); gap: 8px; }
        .box {
            aspect-ratio: 1/1; background: #2f3136; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: bold; border: 1px solid transparent;
        }
        .online { color: var(--online); border-color: var(--online); }
        .warning { color: var(--warning); border-color: var(--warning); }
        .offline { color: var(--offline); border-color: var(--offline); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="navbar">
    <div class="nav-content">
        <a href="#" class="nav-logo"><span>ABYSSUS</span> SENTINEL</a>
    </div>
</nav>
      
<div class="container">
    <div class="section-title">Resumen</div>
    <div class="resumen-box">
        <div>Clusters activos: <b id="stat-clusters">--</b></div>
        <div>Shards Online: <b id="stat-shards">-- / --</b></div> 
        <div class="tech-info">
            <div class="tech-line"><span class="tech-label">RAM TOTAL:</span> <span id="res-ram">-- MB</span></div>
            <div class="tech-line"><span class="tech-label">TOTAL SERVIDORES:</span> <span id="res-servidores">--</span></div>
            <div class="tech-line"><span class="tech-label">TIEMPO ACTIVO:</span> <span id="res-uptime">--</span></div>
        </div>
    </div>

    <div class="section-title">Historial de Consumo (RAM)</div>
    <div class="status-container" style="margin-bottom: 20px;">
        <div style="height: 220px; width: 100%;"><canvas id="ramChart"></canvas></div>
    </div>

    <div class="section-title">Nodos de Clusters</div>
    <div class="status-container"><div id="status-grid" class="grid"></div></div>

    <div class="section-title">Malla de Shards</div>
    <div class="status-container" style="margin-bottom: 40px;"><div id="shards-grid" class="grid"></div></div>
</div>

<script>
let ramHistory = [];
let labelHistory = [];
let ramChart;

function formatUptime(uptimeValue) {
    if (!uptimeValue) return "--";
    let ms = parseInt(uptimeValue);
    if (isNaN(ms)) return uptimeValue;
    let s = Math.floor(ms / 1000);
    let m = Math.floor(s / 60);
    let h = Math.floor(m / 60);
    return h > 0 ? `${h}h ${m % 60}m` : `${m}m ${s % 60}s`;
}

// Inicializar Gráfica
const ctx = document.getElementById('ramChart').getContext('2d');
ramChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: labelHistory,
        datasets: [{
            label: 'RAM (MB)',
            data: ramHistory,
            borderColor: '#00ffcc',
            backgroundColor: 'rgba(0, 255, 204, 0.1)',
            fill: true,
            tension: 0.4,
            pointRadius: 0
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
            y: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#8e9297' } },
            x: { display: false }
        },
        plugins: { legend: { display: false } }
    }
});

async function updateStatus() {
    try {
        const miLink = 'https://volt-nhs-entering-compiled.trycloudflare.com/status'; 
        
        // Usamos una petición más agresiva con headers de JSON
        const res = await fetch(miLink, {
            method: 'GET',
            headers: {
                'Accept': 'application/json',
                'Content-Type': 'application/json'
            }
        });

        if (!res.ok) throw new Error("Error en respuesta");

        const data = await res.json();
        
        // DEBUG: Esto imprimirá los datos en tu consola (F12) para que veas que llegan
        console.log("Datos recibidos:", data);

        if (data && data.clusters) {
            // 1. RESUMEN
            const totalRam = data.clusters.reduce((acc, c) => acc + (parseInt(c.ram) || 0), 0);
            const onlineCount = data.clusters.filter(c => c.status === 'online').length;

            document.getElementById('res-ram').innerText = totalRam.toLocaleString() + " MB";
            document.getElementById('stat-clusters').innerText = data.clusters.length;
            document.getElementById('stat-shards').innerText = `${onlineCount} / ${data.clusters.length}`;
            document.getElementById('res-servidores').innerText = (data.global?.totalGuilds || 0).toLocaleString();
            document.getElementById('res-uptime').innerText = formatUptime(data.uptime || data.clusters[0]?.uptime);

            // 2. GRID DE CLUSTERS
            document.getElementById('status-grid').innerHTML = data.clusters.map(c => {
                const cl = (c.status === 'online') ? 'online' : 'offline';
                return `<div class="box ${cl}">${c.id}</div>`;
            }).join('');

            // 3. GRID DE SHARDS
            document.getElementById('shards-grid').innerHTML = data.clusters.map(c => {
                const cl = (c.status === 'online') ? 'online' : 'offline';
                return `<div class="box ${cl}">S${c.id}</div>`;
            }).join('');
            
            // 4. GRÁFICA
            ramHistory.push(totalRam);
            labelHistory.push(new Date().toLocaleTimeString());
            if(ramHistory.length > 30) { ramHistory.shift(); labelHistory.shift(); }
            ramChart.update();
        }
    } catch (e) {
        console.error("Fallo el fetch:", e);
        document.getElementById('res-uptime').innerText = "Fallo de Lectura";
    }
}
// Iniciar
setInterval(updateStatus, 5000);
updateStatus();
</script>
</body>
</html>
