<div class="header-sentinel">
    <h1>SENTINEL CORE</h1>
    <div id="conexion-texto" class="status-main">
        <div class="online-dot" style="background: #888; box-shadow: none;"></div> 
        <span>Sincronizando con el VPS...</span>
    </div>
</div>

<div id="lista-clusters-detallada" class="clusters-grid">
    <p style="text-align:center; width:100%; opacity:0.5;">Cargando datos de los núcleos...</p>
</div>

<script>
    async function actualizarEstadoColor() {
        const contenedor = document.getElementById('lista-clusters-detallada');
        const statusTexto = document.getElementById('conexion-texto');

        try {
            const res = await fetch('https://shoes-lamb-busy-anytime.trycloudflare.com/api/status');
            
            // Si la respuesta no es OK, lanzamos error para ir al 'catch'
            if (!res.ok) throw new Error('Error en el servidor');
            
            const data = await res.json();

            if (data && data.clusters) {
                contenedor.innerHTML = data.clusters.map(c => {
                    const isOnline = c.status && c.status.toLowerCase() === 'online';
                    const estadoClase = isOnline ? 'status-online' : 'status-offline';
                    const tagClase = isOnline ? 'tag-online' : 'tag-offline';

                    return `
                        <div class="cluster-card-pro ${estadoClase}">
                            <div class="cluster-header">
                                <span class="cluster-title">Cluster ${c.id}</span>
                                <span class="status-tag ${tagClase}">${isOnline ? 'CONECTADO' : 'CAÍDO'}</span>
                            </div>
                            
                            <div class="ram-bar-bg">
                                <div class="ram-bar-fill" style="width: ${(c.ram / 512) * 100}%; background: ${isOnline ? '#00ffcc' : '#f23f43'}"></div>
                            </div>

                            <div class="data-row">
                                <span class="data-label">Uso de Memoria</span>
                                <span class="data-value">${c.ram || 0} MB</span>
                            </div>
                            <div class="data-row">
                                <span class="data-label">Uptime</span>
                                <span class="data-value">${isOnline ? c.uptime : '---'}</span>
                            </div>
                        </div>
                    `;
                }).join('');

                // Actualizar encabezado general
                statusTexto.innerHTML = `<div class="online-dot"></div> <span style="color:#23a55a">SISTEMA TOTALMENTE OPERATIVO</span>`;
            }
        } catch (e) {
            console.error("Error detectado:", e);
            // Si falla, mostramos un mensaje de error visual en lugar de dejarlo en blanco
            statusTexto.innerHTML = `<div class="online-dot" style="background:#f23f43; box-shadow:0 0 10px #f23f43"></div> <span style="color:#f23f43">ERROR DE CONEXIÓN CON EL NODO</span>`;
            contenedor.innerHTML = `<p style="color:#888; grid-column: 1/-1;">No se pudo obtener información de los clusters. Revisa si el VPS está encendido.</p>`;
        }
    }

    // Ejecutar inmediatamente y luego cada 5 segundos
    actualizarEstadoColor();
    setInterval(actualizarEstadoColor, 5000);
</script>
