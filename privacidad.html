<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Abyssus Bot - Aviso de Privacidad</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-web.png">

    <meta name="description" content="Aviso de privacidad de Abyssus Bot. Información sobre el manejo de datos dentro de Discord.">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #05070a;
            --card: rgba(22, 27, 34, 0.7);
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.2);
            --text: #e6edf3;
            --text-dim: #8b949e;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 50% -20%, #161b22, transparent),
                radial-gradient(circle at 0% 100%, rgba(31, 111, 235, 0.05), transparent);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        nav {
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 999;
            border-bottom: 1px solid var(--border);
        }

        nav a {
            margin: 0 10px;
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            padding: 5px 10px;
        }

        nav a:hover { color: var(--accent); }

        header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(180deg, rgba(31, 111, 235, 0.15) 0%, transparent 100%);
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 8vw, 3.2rem);
            background: linear-gradient(to bottom, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        header p { color: var(--text-dim); font-weight: 500; font-size: 0.95rem; }

        main {
            max-width: 900px;
            margin: auto;
            padding: 10px 15px 80px 15px;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @media (min-width: 768px) {
            header { padding: 90px 20px; }
            main { padding: 20px 20px 100px 20px; }
            .card { padding: 35px; border-radius: 24px; transform: translateY(30px); }
            nav a { margin: 0 20px; font-size: 0.9rem; }
        }

        .card.visible { 
            opacity: 1; 
            transform: translateY(0); 
        }

        .card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
            transform: translateY(-5px);
        }

        .card h2 {
            color: var(--accent);
            font-size: clamp(1.2rem, 5vw, 1.5rem);
            font-weight: 800;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card p, .card li { 
            color: #ced4da; 
            margin-bottom: 12px; 
            font-size: 0.95rem;
        }

        ul { list-style: none; padding-left: 5px; }
        ul li { display: flex; align-items: flex-start; gap: 8px; }
        ul li::before {
            content: "•";
            color: var(--accent);
            font-weight: bold;
        }

        code {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent);
            padding: 2px 6px;
            border-radius: 6px;
            font-family: 'Consolas', monospace;
            font-size: 0.9em;
            word-break: break-all;
        }

        .contact-badge {
            display: inline-block;
            background: var(--accent);
            color: #05070a;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 800;
            text-decoration: none;
            margin-top: 10px;
            transition: 0.3s ease;
            font-size: 0.9rem;
            width: 100%;
            text-align: center;
        }

        @media (min-width: 480px) {
            .contact-badge { width: auto; }
        }

        .contact-badge:hover {
            transform: scale(1.05);
            background: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        #backToTop {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: #05070a;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        @media (min-width: 768px) {
            #backToTop { width: 50px; height: 50px; bottom: 30px; right: 30px; border-radius: 15px; }
        }

        #backToTop.show { 
            opacity: 1; 
            visibility: visible; 
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
        }
    </style>
</head>

<body>

<nav>
    <a href="index.html">Inicio</a>
    <a href="commands.html">Comandos</a>
</nav>



<footer>
    <p>© 2021–2026 Abyssus Bot System. Todos los derechos reservados.</p>
</footer>

<button id="backToTop" title="Subir"><i class="fa-solid fa-arrow-up"></i></button>

<script>
    const btn = document.getElementById("backToTop");
    window.addEventListener("scroll", () => {
        if (window.scrollY > 300) {
            btn.classList.add("show");
        } else {
            btn.classList.remove("show");
        }
    });
    
    btn.onclick = () => {
        window.scrollTo({
            top: 0, 
            behavior: "smooth"
        });
    };

    const observerOptions = {
        threshold: 0.1,
        rootMargin: "0px 0px -50px 0px"
    };

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add("visible");
            }
        });
    }, observerOptions);

    document.querySelectorAll(".fade-in").forEach(el => observer.observe(el));
</script>

</body>
</html>
