<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssus Bot - Networl</title>
    <link rel="icon" href="img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-web.png">
    <style>
        /* BASE & RESET (Copiado de tu index) */
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth;}

        body{
          font-family:'Inter',sans-serif;
          background: radial-gradient(circle at top,#0f172a,#020617);
          color:#fff;
          padding-top:120px;
          min-height: 100vh;
        }

        /* ===== NAV (Copiado exactamente de tu código) ===== */
        .nav{
          position:fixed;
          top:0;
          width:100%;
          backdrop-filter:blur(14px);
          background:rgba(15,23,42,0.6);
          border-bottom:1px solid rgba(255,255,255,0.06);
          z-index:1000;
        }
        .nav-container{
          max-width:1200px;
          margin:auto;
          padding:15px 30px;
          display:flex;
          align-items:center;
          justify-content:space-between;
        }
        .logo{
          display:flex;
          align-items:center;
          gap:10px;
          font-weight:800;
          font-size:1.3rem;
        }
        .logo span{
          background:linear-gradient(90deg,#38bdf8,#6366f1);
          -webkit-background-clip:text;
          color:transparent;
        }
        .logo img{
          width:36px;
          height:36px;
          border-radius:8px;
          animation:pulseLogo 2.5s infinite ease-in-out;
        }
        @keyframes pulseLogo{
          0%{ transform:scale(1); box-shadow:0 0 0 rgba(56,189,248,0); }
          50%{ transform:scale(1.08); box-shadow:0 0 20px rgba(56,189,248,0.6); }
          100%{ transform:scale(1); box-shadow:0 0 0 rgba(56,189,248,0); }
        }
        .nav-links a{
          color:#aaa;
          margin:0 15px;
          text-decoration:none;
          font-size:14px;
          position:relative;
          transition:.3s;
        }
        .nav-links a:hover{color:#fff;}
        .nav-links a::after{
          content:"";
          position:absolute;
          left:0;
          bottom:-5px;
          width:0%;
          height:2px;
          background:linear-gradient(90deg,#38bdf8,#6366f1);
          transition:.3s;
        }
        .nav-links a:hover::after{ width:100%; }

        .discord-btn{
          display:flex;
          align-items:center;
          gap:8px;
          padding:10px 18px;
          border-radius:12px;
          font-weight:600;
          font-size:14px;
          text-decoration:none;
          color:#fff;
          background:linear-gradient(135deg,#5865F2,#4752C4);
          box-shadow:0 4px 20px rgba(88,101,242,0.35);
          transition:.25s;
        }

        /* SECCIÓN NETWORK */
        .network-header {
            text-align: center;
            max-width: 800px;
            margin: 0 auto 60px auto;
            padding: 0 20px;
        }
        .network-header h1 { font-size: 3rem; font-weight: 800; margin-bottom: 15px; }
        .network-header span {
            background: linear-gradient(90deg,#38bdf8,#6366f1);
            -webkit-background-clip: text;
            color: transparent;
        }
        .network-header p { color: #aaa; font-size: 1.1rem; }

        .grid-container {
            max-width: 1100px;
            margin: auto;
            padding: 0 20px 80px 20px;
        }

        .network-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        .node-card {
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 35px;
            border-radius: 20px;
            transition: 0.3s ease;
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
        }

        .node-card:hover {
            transform: translateY(-5px);
            border-color: #38bdf8;
            background: rgba(255, 255, 255, 0.05);
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            color: #38bdf8;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .online-dot {
            height: 10px; width: 10px;
            background-color: #23a55a;
            border-radius: 50%;
            box-shadow: 0 0 8px #23a55a;
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .node-name { font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; }
        .node-desc { color: #aaa; font-size: 0.95rem; line-height: 1.6; margin-bottom: 25px; flex-grow: 1; }

        .node-btn {
            padding: 12px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            text-align: center;
            background: linear-gradient(135deg,#6366f1,#38bdf8);
            color: #fff;
            transition: .3s;
            font-size: 0.9rem;
        }
        .node-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>
<body>

    <!-- NAV REUTILIZADA -->
    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" style="text-decoration: none; color: inherit;">
                <div class="logo">
                    <img src="img/favicon-web.png" alt="Abyssus Logo">
                    <span>ABYSSUS</span>
                </div>
            </a>
            <div class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="commands.html#features">Comandos</a>
                <a href="staffteam.html#features">Staff</a>
                <a href="network.html" style="color: #fff; font-weight: 600;">Network</a>
                <a href="estado.html#features">Estado de Red</a>
            </div>
            </a>
        </div>
    </nav>

    <div class="network-header">
        <h1>Red de <span>Confianza</span></h1>
        <p>Nodos verificados y comunidades bajo la protección de Abyssus.</p>
    </div>

    <div class="grid-container">
        <div id="aliados-grid" class="network-grid">
            <!-- Los servidores se cargan aquí -->
        </div>
    </div>

   <script>
    // 1. Definimos la lista correctamente (corregido corchetes y llaves)
    const aliados = [
        {
            nombre: "La Cueva Fresqui 🐻🥣",
            descripcion: "¡Tu nuevo hogar y nodo principal de Abyssus! Una comunidad acogedora con eventos épicos, staff atento y beneficios para boosters. ¡Donde Polar aprueba tu estancia y los Cueva-hermanos te esperan! 🐼❄️",
            link: "https://discord.gg/yqyVfTbU9e"
        }, // <-- Coma necesaria para separar
        {
            nombre: "COMUNIDAD OBJETIVO",
            descripcion: "Comunidad aliada enfocada en sistemas de economía y trading verificada.",
            link: "https://discord.gg/ejemplo2"
        }
    ];

    // 2. Seleccionamos el grid
    const grid = document.getElementById('aliados-grid');

    // 3. Renderizamos (usamos una validación para asegurar que el grid existe)
    if (grid) {
        grid.innerHTML = aliados.map(a => `
            <div class="node-card">
                <div class="status-container">
                    <div class="online-dot"></div> NODO ACTIVO
                </div>
                <div class="node-name">${a.nombre}</div>
                <div class="node-desc">${a.descripcion}</div>
                <a href="${a.link}" class="node-btn" target="_blank">CONECTAR AL NODO</a>
            </div>
        `).join('');
    }
</script>
</body>
</html>
