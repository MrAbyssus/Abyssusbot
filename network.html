<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssus Bot - Network</title>
    <link rel="icon" href="img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-web.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* BASE & RESET */
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth;}

        body{
          font-family:'Inter',sans-serif;
          background: radial-gradient(circle at top,#0f172a,#020617);
          color:#fff;
          padding-top:100px; /* Ajustado para el Nav */
          min-height: 100vh;
          overflow-x: hidden;
        }

        /* ===== NAV (Optimizado para Celular) ===== */
        .nav{
          position:fixed;
          top:0;
          width:100%;
          backdrop-filter:blur(14px);
          background:rgba(15,23,42,0.6);
          border-bottom:1px solid rgba(255,255,255,0.06);
          z-index:1000;
        }
        .nav-container{
          max-width:1200px;
          margin:auto;
          padding:15px 30px;
          display:flex;
          align-items:center;
          justify-content:space-between;
        }
        .logo{
          display:flex;
          align-items:center;
          gap:10px;
          font-weight:800;
          font-size:1.3rem;
        }
        .logo span{
          background:linear-gradient(90deg,#38bdf8,#6366f1);
          -webkit-background-clip:text;
          color:transparent;
        }
        .logo img{
          width:36px;
          height:36px;
          border-radius:8px;
          animation:pulseLogo 2.5s infinite ease-in-out;
        }
        @keyframes pulseLogo{
          0%{ transform:scale(1); box-shadow:0 0 0 rgba(56,189,248,0); }
          50%{ transform:scale(1.08); box-shadow:0 0 20px rgba(56,189,248,0.6); }
          100%{ transform:scale(1); box-shadow:0 0 0 rgba(56,189,248,0); }
        }
        .nav-links a{
          color:#aaa;
          margin:0 15px;
          text-decoration:none;
          font-size:14px;
          position:relative;
          transition:.3s;
        }
        .nav-links a:hover, .nav-links a.active{color:#fff;}
        
        /* SECCIÓN NETWORK */
        .network-header {
            text-align: center;
            max-width: 800px;
            margin: 0 auto 40px auto;
            padding: 0 20px;
        }
        .network-header h1 { font-size: clamp(2rem, 8vw, 3rem); font-weight: 800; margin-bottom: 15px; }
        .network-header span {
            background: linear-gradient(90deg,#38bdf8,#6366f1);
            -webkit-background-clip: text;
            color: transparent;
        }
        .network-header p { color: #aaa; font-size: 1.1rem; }

        .grid-container {
            max-width: 1100px;
            margin: auto;
            padding: 0 20px 80px 20px;
        }

        .network-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        .node-card {
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 30px;
            border-radius: 20px;
            transition: 0.3s ease;
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
        }

        .node-card:hover {
            transform: translateY(-5px);
            border-color: #38bdf8;
            background: rgba(255, 255, 255, 0.05);
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            color: #38bdf8;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .online-dot {
            height: 10px; width: 10px;
            background-color: #23a55a;
            border-radius: 50%;
            box-shadow: 0 0 8px #23a55a;
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .node-name { font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; }
        .node-desc { color: #aaa; font-size: 0.95rem; line-height: 1.6; margin-bottom: 25px; flex-grow: 1; }

        .node-btn {
            padding: 12px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            text-align: center;
            background: linear-gradient(135deg,#6366f1,#38bdf8);
            color: #fff;
            transition: .3s;
            font-size: 0.9rem;
        }
        .node-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        /* ============================================= */
        /* AJUSTES PARA CELULAR (SIN ROMPER NADA)        */
        /* ============================================= */
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                padding: 10px;
                gap: 15px;
            }
            .nav-links {
                display: flex;
                overflow-x: auto;
                width: 100%;
                justify-content: flex-start;
                padding-bottom: 5px;
                scrollbar-width: none; /* Oculta scroll en Firefox */
            }
            .nav-links::-webkit-scrollbar { display: none; } /* Oculta scroll en Chrome */
            
            .nav-links a {
                margin: 0 10px;
                white-space: nowrap; /* Evita que los links se partan en dos lineas */
                font-size: 13px;
            }
            
            body { padding-top: 140px; } /* Más espacio para el Nav doble */
            
            .network-grid {
                grid-template-columns: 1fr; /* Una columna en móvil */
            }
            
            .node-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" style="text-decoration: none; color: inherit;">
                <div class="logo">
                    <img src="img/favicon-web.png" alt="Abyssus Logo">
                    <span>Abyssus Bot</span>
                </div>
            </a>
            <div class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="commands.html">Comandos</a>
                <a href="staffteam.html">Staff</a>
                <a href="network.html" style="color: #fff; font-weight: 600; border-bottom: 2px solid #38bdf8;">Network</a>
                <a href="estado.html">Estado de Red</a>
            </div>
        </div>
    </nav>

    <div class="network-header">
        <h1>Servidores que <span>Apoyan a Abyssus Bot</span></h1>
        <p>Nodos verificados y comunidades bajo la protección de Abyssus.</p>
    </div>

    <div class="grid-container">
        <div id="aliados-grid" class="network-grid">
            </div>
    </div>

    <script>
    const aliados = [
        {
            nombre: "La Cueva Fresqui 🐻🥣",
            descripcion: "¡Tu nuevo hogar y nodo principal de Abyssus! Una comunidad acogedora con eventos épicos, staff atento y beneficios para boosters. ¡Donde Polar aprueba tu estancia y los Cueva-hermanos te esperan! 🐼❄️",
            link: "https://discord.gg/yqyVfTbU9e"
        },
        {
            nombre: "Espacio Disponible",
            descripcion: "Este espacio está reservado para futuros aliados de la red Abyssus. Si quieres que tu comunidad sea parte de nuestra red de confianza, contacta con el staff.",
            link: "#"
        }
    ];

    const grid = document.getElementById('aliados-grid');

    if (grid) {
        grid.innerHTML = aliados.map(a => `
            <div class="node-card">
                <div class="status-container">
                    <div class="online-dot"></div> NODO ACTIVO
                </div>
                <div class="node-name">${a.nombre}</div>
                <div class="node-desc">${a.descripcion}</div>
                <a href="${a.link}" class="node-btn" target="_blank">Entrar al servidor</a>
            </div>
        `).join('');
    }
    </script>
</body>
</html>
