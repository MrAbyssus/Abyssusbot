<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>404 // ABYSSUS_OFFLINE</title>
    <style>
        /* Ajusta este color al de tu bot (ejemplo: un azul eléctrico o púrpura) */
        :root { --accent: #58a6ff; --bg-dark: #05070a; }
        
        body { 
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: var(--bg-dark);
            font-family: 'Inter', system-ui, sans-serif; color: white; overflow: hidden;
        }

        /* Efecto de luz ambiental en el fondo */
        .glow { position: absolute; width: 300px; height: 300px; background: var(--accent); 
                filter: blur(150px); opacity: 0.1; border-radius: 50%; pointer-events: none; }

        .card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 40px; border-radius: 20px;
            text-align: center; 
            max-width: 400px;
            transition: transform 0.4s ease-out;
            cursor: default;
        }

        h1 { font-size: 80px; margin: 0; color: var(--accent); font-weight: 800; letter-spacing: -2px; }
        .status-text { color: #8b949e; margin: 15px 0 30px; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
        
        .btn { 
            display: inline-block; padding: 12px 25px; 
            background: transparent; border: 1px solid var(--accent);
            color: var(--accent); border-radius: 8px; font-weight: 600; 
            text-decoration: none; transition: 0.3s; font-size: 14px;
        }
        .btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px rgba(88, 166, 255, 0.3); }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="card" id="card">
        <h1>404</h1>
        <p>SECTOR NO ENCONTRADO</p>
        <div class="status-text">La red Abyssus no ha podido mapear esta ubicación.</div>
        <a href="index.html" class="btn">RECONECTAR_NODO</a>
    </div>

    <script>
        // Efecto visual de seguimiento suave
        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 15;
            const y = (e.clientY / window.innerHeight - 0.5) * 15;
            card.style.transform = `perspective(1000px) rotateY(${x}deg) rotateX(${-y}deg)`;
        });
    </script>
</body>
</html>
